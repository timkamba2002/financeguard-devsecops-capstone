---
# dev namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: financeguard-backend-secret
  namespace: dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: financeguard-backend-secret    # creates this K8s Secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL             # K8s Secret key
      remoteRef:
        key:      financeguard/database   # AWS Secrets Manager secret name
        property: DATABASE_URL            # JSON key inside the secret
    - secretKey: SECRET_KEY
      remoteRef:
        key:      financeguard/app
        property: SECRET_KEY

---
# staging namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: financeguard-backend-secret
  namespace: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: financeguard-backend-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key:      financeguard/database
        property: DATABASE_URL
    - secretKey: SECRET_KEY
      remoteRef:
        key:      financeguard/app
        property: SECRET_KEY

---
# prod namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: financeguard-backend-secret
  namespace: prod
spec:
  refreshInterval: 15m    # refresh more frequently in prod
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: financeguard-backend-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key:      financeguard/database
        property: DATABASE_URL
    - secretKey: SECRET_KEY
      remoteRef:
        key:      financeguard/app
        property: SECRET_KEY

# ─── After applying, update your Helm chart's deployment template ─────────────
#
# In helm/backend/templates/deployment.yaml, replace:
#
#   env:
#     - name: DATABASE_URL
#       value: {{ .Values.env.DATABASE_URL }}
#
# With:
#
#   envFrom:
#     - secretRef:
#         name: financeguard-backend-secret
#
# The ExternalSecret controller syncs the AWS secret to the K8s Secret,
# and the pod picks it up via envFrom. No credentials ever appear in
# values.yaml, ConfigMaps, or CI logs.
