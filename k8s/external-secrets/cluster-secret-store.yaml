apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name:      external-secrets
            namespace: external-secrets

# ─── Setup instructions ────────────────────────────────────────────────────────
#
# 1. Create the secret in AWS Secrets Manager (run once):
#
#      aws secretsmanager create-secret \
#        --name "financeguard/database" \
#        --secret-string '{"DATABASE_URL":"postgresql://user:pass@host:5432/financeguard"}'
#
#      aws secretsmanager create-secret \
#        --name "financeguard/app" \
#        --secret-string '{"SECRET_KEY":"<generate-with-openssl-rand-hex-32>"}'
#
# 2. Create an IAM policy (run once):
#
#      aws iam create-policy \
#        --policy-name FinanceGuardSecretsManagerReadOnly \
#        --policy-document '{
#          "Version":"2012-10-17",
#          "Statement":[{
#            "Effect":"Allow",
#            "Action":["secretsmanager:GetSecretValue","secretsmanager:DescribeSecret"],
#            "Resource":"arn:aws:secretsmanager:us-east-1:866934333672:secret:financeguard/*"
#          }]
#        }'
#
# 3. Create IAM role with IRSA trust for the ESO service account:
#
#      OIDC=$(aws eks describe-cluster --name financeguard-eks-dev \
#        --query "cluster.identity.oidc.issuer" --output text | cut -d/ -f5-)
#
#      aws iam create-role \
#        --role-name FinanceGuardESO \
#        --assume-role-policy-document "{
#          \"Version\":\"2012-10-17\",
#          \"Statement\":[{
#            \"Effect\":\"Allow\",
#            \"Principal\":{\"Federated\":\"arn:aws:iam::866934333672:oidc-provider/$OIDC\"},
#            \"Action\":\"sts:AssumeRoleWithWebIdentity\",
#            \"Condition\":{\"StringEquals\":{
#              \"$OIDC:sub\":\"system:serviceaccount:external-secrets:external-secrets\"
#            }}
#          }]
#        }"
#
#      aws iam attach-role-policy \
#        --role-name FinanceGuardESO \
#        --policy-arn arn:aws:iam::866934333672:policy/FinanceGuardSecretsManagerReadOnly
#
# 4. Install External Secrets Operator:
#
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm install external-secrets external-secrets/external-secrets \
#        --namespace external-secrets --create-namespace \
#        --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=\
#            arn:aws:iam::866934333672:role/FinanceGuardESO
#
# 5. Apply this ClusterSecretStore + the ExternalSecret manifests:
#
#      kubectl apply -f k8s/external-secrets/
