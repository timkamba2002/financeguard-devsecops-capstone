replicaCount: 2

image:
  tag: "latest"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

ingress:
  enabled: true

env:
  # After first deploy, run: kubectl get ingress -n staging -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}'
  # then update this value and re-run the pipeline or commit the change.
  BACKEND_API_URL: "http://STAGING_BACKEND_ALB_REPLACE_AFTER_FIRST_DEPLOY"
