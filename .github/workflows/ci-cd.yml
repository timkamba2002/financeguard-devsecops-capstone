name: FinanceGuard DevSecOps Pipeline

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    branches: [ main, staging, development ]

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  866934333672.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER:   financeguard-eks-dev
  CHART_REPO:    oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

# ═══════════════════════════════════════════════════════════════════════════════
# Full pipeline stages
#
#  1  BUILD          – Python wheel + frontend asset artifacts (all branches)
#  2  TEST           – pytest + JUnit XML + coverage report   (all branches)
#  3  SECURITY SCAN  – Bandit · Safety · Hadolint · Checkov   (all branches)
#  4  BUILD IMAGES   – Docker build (GHA layer cache) + Trivy scan + SBOM
#  5  PUSH IMAGES    – ECR push :sha + :<branch>-latest
#  6  HELM PACKAGE   – helm package → .tgz archive + helm push to ECR OCI
#
#  branch: development
#  7a DEPLOY DEV     – helm upgrade --install (dev namespace, --atomic)
#  8a INT TESTS DEV  – pytest tests/integration/ against live dev ALB
#  9a PROMOTE        – ECR retag :sha → :dev-verified + auto PR dev→staging
#
#  branch: staging
#  7b DEPLOY STAGING – helm upgrade --install (staging namespace, --atomic)
#  8b INT TESTS STG  – pytest tests/integration/ against live staging ALB
#  9b PROMOTE        – ECR retag :sha → :staging-verified + auto PR staging→main
#
#  branch: main
#  7c DEPLOY PROD    – manual approval gate → helm upgrade (prod namespace)
#  8c SMOKE + RELEASE– health/API smoke test · retag :stable · GitHub Release
# ═══════════════════════════════════════════════════════════════════════════════

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1 · BUILD
  # Compiles Python wheel + collects frontend assets.
  # Artifacts are uploaded so later jobs don't need to re-install dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Stage 1 · Build Artifacts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build wheel

      - name: Build Python wheel
        run: |
          cd app/backend
          python -m build --wheel --outdir ../../dist/
          echo "── Wheel artifact ──────────────────────────"
          ls -lh ../../dist/

      - name: Upload backend wheel
        uses: actions/upload-artifact@v4
        with:
          name: backend-wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 7

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets-${{ github.sha }}
          path: app/frontend/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 · TEST
  # Runs unit tests, publishes JUnit XML as a GitHub check,
  # uploads HTML coverage report as a downloadable artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Stage 2 · Test & Coverage"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-wheel-${{ github.sha }}
          path: dist/

      - name: Install wheel + test dependencies
        run: |
          pip install dist/*.whl
          pip install pytest pytest-cov black

      - name: Lint – Black
        run: black --check app/backend/

      - name: Unit tests with coverage
        run: |
          pytest app/backend/tests/ \
            --junitxml=test-results/junit.xml \
            --cov=app/backend \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/coverage-html/ \
            -v
        env:
          DATABASE_URL: "sqlite:///./test.db"

      - name: Publish test results to GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test result artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 · SECURITY & IaC SCAN
  # Bandit  – Python SAST (fails on HIGH severity)
  # Safety  – dependency CVE audit
  # Hadolint– Dockerfile best-practice lint
  # Checkov – Terraform IaC misconfiguration scan
  # SARIF results are uploaded to GitHub Security tab (Advisories > Code scanning)
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Stage 3 · Security & IaC Scan"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install SAST tools
        run: pip install bandit safety

      - name: Install app dependencies (needed for Safety)
        run: pip install -r app/backend/requirements.txt

      - name: SAST – Bandit (report all, fail on HIGH)
        run: |
          bandit -r app/backend/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r app/backend/ --severity-level high

      - name: Dependency audit – Safety
        run: safety check --full-report

      - name: Dockerfile lint – backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: Dockerfile lint – frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/frontend/Dockerfile

      - name: IaC scan – Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: |
            bandit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4 · BUILD & SCAN CONTAINER IMAGES
  # Uses GitHub Actions cache for Docker layers (speeds up repeat builds).
  # Trivy scans the LOCAL image before it ever touches ECR.
  # Anchore Syft generates an SBOM (Software Bill of Materials) for supply-chain
  # visibility. Only runs on branch pushes (not PRs).
  # ─────────────────────────────────────────────────────────────────────────────
  build-images:
    name: "Stage 4 · Build & Scan Images"
    runs-on: ubuntu-latest
    needs: [ test, security-scan ]
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (with GHA layer cache)
        uses: docker/build-push-action@v5
        with:
          context:    ./app/backend
          load:       true
          push:       false
          tags:       financeguard-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build frontend image (with GHA layer cache)
        uses: docker/build-push-action@v5
        with:
          context:    ./app/frontend
          load:       true
          push:       false
          tags:       financeguard-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Vulnerability scan – backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:       financeguard-backend:${{ github.sha }}
          format:          sarif
          output:          trivy-backend.sarif
          exit-code:       "1"
          ignore-unfixed:  true
          vuln-type:       os,library
          severity:        CRITICAL,HIGH

      - name: Vulnerability scan – frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:       financeguard-frontend:${{ github.sha }}
          format:          sarif
          output:          trivy-frontend.sarif
          exit-code:       "1"
          ignore-unfixed:  true
          vuln-type:       os,library
          severity:        CRITICAL,HIGH

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

      - name: Generate SBOM – backend (Syft/SPDX)
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-backend:${{ github.sha }}
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json

      - name: Generate SBOM – frontend (Syft/SPDX)
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-frontend:${{ github.sha }}
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json

      - name: Save images to tar for next stage
        run: |
          docker save financeguard-backend:${{ github.sha }}  | gzip > backend-image.tar.gz
          docker save financeguard-frontend:${{ github.sha }} | gzip > frontend-image.tar.gz

      - name: Upload image tars
        uses: actions/upload-artifact@v4
        with:
          name:           container-images-${{ github.sha }}
          path:           "*.tar.gz"
          retention-days: 1   # ephemeral — only needed until push-images runs

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 5 · PUSH IMAGES TO ECR
  # Loads the scanned tars, tags with :sha and :<branch>-latest, pushes.
  # The :sha tag is immutable and used by all downstream deploy jobs.
  # ─────────────────────────────────────────────────────────────────────────────
  push-images:
    name: "Stage 5 · Push Images to ECR"
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image tars
        uses: actions/download-artifact@v4
        with:
          name: container-images-${{ github.sha }}

      - name: Load images from tar
        run: |
          docker load < backend-image.tar.gz
          docker load < frontend-image.tar.gz

      - name: Tag & push backend to ECR
        run: |
          B=${{ env.ECR_REGISTRY }}/financeguard-backend
          docker tag financeguard-backend:${{ github.sha }} $B:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }} $B:${{ github.ref_name }}-latest
          docker push $B:${{ github.sha }}
          docker push $B:${{ github.ref_name }}-latest
          echo "Pushed $B:${{ github.sha }}"

      - name: Tag & push frontend to ECR
        run: |
          F=${{ env.ECR_REGISTRY }}/financeguard-frontend
          docker tag financeguard-frontend:${{ github.sha }} $F:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} $F:${{ github.ref_name }}-latest
          docker push $F:${{ github.sha }}
          docker push $F:${{ github.ref_name }}-latest
          echo "Pushed $F:${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6 · HELM PACKAGE & PUSH CHART ARCHIVE TO ECR OCI
  # Packages each chart as a versioned .tgz artifact (build artifact).
  # Pushes to ECR OCI (oci://ECR/charts/<chart-name>).
  # Downstream deploy jobs pull from ECR OCI — no filesystem path dependency.
  #
  # NOTE: ECR repos for charts must exist before first push:
  #   aws ecr create-repository --repository-name charts/backend
  #   aws ecr create-repository --repository-name charts/frontend
  # ─────────────────────────────────────────────────────────────────────────────
  helm-package:
    name: "Stage 6 · Package & Push Helm Charts"
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push'
    outputs:
      chart-version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive chart version
        id: ver
        run: echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Package backend chart
        run: |
          helm package helm/backend \
            --version     ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/charts/

      - name: Package frontend chart
        run: |
          helm package helm/frontend \
            --version     ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/charts/

      - name: Upload chart archives as artifact
        uses: actions/upload-artifact@v4
        with:
          name:           helm-charts-${{ github.sha }}
          path:           dist/charts/*.tgz
          retention-days: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Ensure ECR chart repos exist
        run: |
          for repo in charts/backend charts/frontend; do
            aws ecr describe-repositories --repository-names $repo 2>/dev/null || \
              aws ecr create-repository --repository-name $repo \
                --image-scanning-configuration scanOnPush=true
          done

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Push charts to ECR OCI
        run: |
          helm push dist/charts/backend-${{ steps.ver.outputs.version }}.tgz  ${{ env.CHART_REPO }}
          helm push dist/charts/frontend-${{ steps.ver.outputs.version }}.tgz ${{ env.CHART_REPO }}
          echo "Charts available at:"
          echo "  ${{ env.CHART_REPO }}/backend:${{ steps.ver.outputs.version }}"
          echo "  ${{ env.CHART_REPO }}/frontend:${{ steps.ver.outputs.version }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7a · DEPLOY TO DEV  (development branch only)
  # helm upgrade --install with --atomic: rolls back automatically on timeout.
  # Uses the chart from ECR OCI and overrides image.tag with the git SHA.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "Stage 7 · Deploy to Dev"
    runs-on: ubuntu-latest
    needs: [ push-images, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Deploy backend → dev (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-backend-dev \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: Deploy frontend → dev (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-frontend-dev \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8a · INTEGRATION TESTS – dev
  # Waits for the ALB to be ready, then runs tests/integration/test_api.py
  # against the live dev cluster. Results are published as a GitHub check.
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test-dev:
    name: "Stage 8 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get dev ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT
          echo "Dev ALB: http://$HOST"

      - name: Install test dependencies
        run: pip install requests pytest pytest-html

      - name: Run integration tests against dev
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests (dev)
          path: integration-results/junit.xml
          reporter: java-junit

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-dev-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 9a · PROMOTE IMAGE + OPEN PR  (dev → staging)
  # Re-tags the image in ECR without pulling/pushing the full layer data.
  # Uses aws ecr batch-get-image + put-image to apply a new tag to the same
  # image manifest — the image bytes never move.
  # ─────────────────────────────────────────────────────────────────────────────
  promote-dev:
    name: "Stage 9 · Promote Image + Open PR (dev→staging)"
    runs-on: ubuntu-latest
    needs: integration-test-dev
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Retag backend → dev-verified (ECR manifest copy, no re-push)
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag dev-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"
          echo "Tagged financeguard-backend:dev-verified-${{ github.sha }}"

      - name: Retag frontend → dev-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag dev-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"
          echo "Tagged financeguard-frontend:dev-verified-${{ github.sha }}"

      - name: Open promotion PR (development → staging)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --base staging --head development --state open \
            --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — skipping"
            exit 0
          fi
          gh pr create \
            --base staging \
            --head development \
            --title "promote(dev→staging): ${{ github.sha }}" \
            --body "## Automated promotion: development → staging

          All dev pipeline stages passed for \`${{ github.sha }}\`.

          | Stage | Result |
          |---|---|
          | Unit tests | ✅ Passed |
          | SAST (Bandit) | ✅ Passed |
          | Dependency audit (Safety) | ✅ Passed |
          | Container scan (Trivy) | ✅ Passed |
          | Dev deploy (helm upgrade) | ✅ Passed |
          | Integration tests (dev) | ✅ Passed |

          **Promoted images:**
          - \`financeguard-backend:dev-verified-${{ github.sha }}\`
          - \`financeguard-frontend:dev-verified-${{ github.sha }}\`

          **Before merging, verify:**
          - [ ] Smoke-tested in dev environment
          - [ ] No unexpected log errors in dev
          - [ ] Ready for staging deploy

          Merging this PR pushes to \`staging\` and triggers the staging pipeline."

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7b · DEPLOY TO STAGING  (staging branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: "Stage 7 · Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [ push-images, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Deploy backend → staging (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-backend-staging \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: Deploy frontend → staging (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-frontend-staging \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8b · INTEGRATION TESTS – staging
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test-staging:
    name: "Stage 8 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get staging ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT
          echo "Staging ALB: http://$HOST"

      - name: Install test dependencies
        run: pip install requests pytest pytest-html

      - name: Run integration tests against staging
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests (staging)
          path: integration-results/junit.xml
          reporter: java-junit

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-staging-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 9b · PROMOTE IMAGE + OPEN PR  (staging → main)
  # ─────────────────────────────────────────────────────────────────────────────
  promote-staging:
    name: "Stage 9 · Promote Image + Open PR (staging→main)"
    runs-on: ubuntu-latest
    needs: integration-test-staging
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Retag backend → staging-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag staging-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Retag frontend → staging-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag staging-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Open promotion PR (staging → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --base main --head staging --state open \
            --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — skipping"
            exit 0
          fi
          gh pr create \
            --base main \
            --head staging \
            --title "promote(staging→prod): ${{ github.sha }}" \
            --body "## Automated promotion: staging → production

          All staging pipeline stages passed for \`${{ github.sha }}\`.

          | Stage | Result |
          |---|---|
          | Unit tests | ✅ Passed |
          | SAST (Bandit) | ✅ Passed |
          | Dependency audit (Safety) | ✅ Passed |
          | Container scan (Trivy) | ✅ Passed |
          | Staging deploy (helm upgrade) | ✅ Passed |
          | Integration tests (staging) | ✅ Passed |

          **Images ready for production:**
          - \`financeguard-backend:staging-verified-${{ github.sha }}\`
          - \`financeguard-frontend:staging-verified-${{ github.sha }}\`

          **Before merging, confirm:**
          - [ ] Staging validated and signed off
          - [ ] Rollback plan confirmed (\`helm rollback\` or previous SHA)
          - [ ] Change window approved

          > **Note:** Merging triggers \`deploy-prod\`, which pauses for
          > manual approval in GitHub Environments before touching production."

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7c · DEPLOY TO PRODUCTION  (main branch only)
  # Pauses at the GitHub Environments approval gate before executing.
  # Uses --atomic so a failed rollout auto-reverts (Helm rollback).
  # Deploys the same :sha that was staging-verified — no image rebuild.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "Stage 7 · Deploy to Production"
    runs-on: ubuntu-latest
    needs: [ push-images, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production     # ← pipeline pauses here for your approval click
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Deploy backend → production (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-backend-prod \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      - name: Deploy frontend → production (helm upgrade --atomic)
        run: |
          helm upgrade --install financeguard-frontend-prod \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8c · SMOKE TEST + RETAG STABLE + GITHUB RELEASE
  # Quick curl smoke-test against prod ALB.
  # Retags the deployed SHA as :stable (no re-push).
  # Creates a GitHub Release with the versioned Helm chart archives attached.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: "Stage 8 · Smoke Test & Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Smoke test production
        run: |
          HOST=$(kubectl get ingress -n prod \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "Production URL: http://$HOST"

          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://$HOST/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ /health → 200 (attempt $i)"
              break
            fi
            echo "⏳ Attempt $i → $STATUS, retrying in 10s..."
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "❌ Health check failed after 2 min"; exit 1; }

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://$HOST/api/v1/transactions || echo "000")
          echo "GET /api/v1/transactions → $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ API smoke test failed"; exit 1; }

          echo "✅ Production smoke tests passed"

      - name: Retag backend → :stable (no re-push)
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag stable \
            --image-manifest "$MANIFEST"
          echo "financeguard-backend:stable → ${{ github.sha }}"

      - name: Retag frontend → :stable (no re-push)
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag stable \
            --image-manifest "$MANIFEST"
          echo "financeguard-frontend:stable → ${{ github.sha }}"

      - name: Download helm chart artifacts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts-${{ github.sha }}
          path: dist/charts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "## FinanceGuard v0.1.${{ github.run_number }}

          **Commit:** \`${{ github.sha }}\`

          ### Pipeline summary
          | Stage | Status |
          |---|---|
          | Build artifacts | ✅ |
          | Unit tests | ✅ |
          | SAST + dependency audit | ✅ |
          | Container scan (Trivy) | ✅ |
          | SBOM generated | ✅ |
          | Integration tests (dev) | ✅ |
          | Integration tests (staging) | ✅ |
          | Production smoke test | ✅ |

          ### Images in ECR
          | Image | Tags |
          |---|---|
          | \`financeguard-backend\` | \`${{ github.sha }}\` · \`stable\` |
          | \`financeguard-frontend\` | \`${{ github.sha }}\` · \`stable\` |

          ### Helm charts (attached)
          \`backend-0.1.${{ github.run_number }}.tgz\` and \`frontend-0.1.${{ github.run_number }}.tgz\`
          " \
            dist/charts/*.tgz
