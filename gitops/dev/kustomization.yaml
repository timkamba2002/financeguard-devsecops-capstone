apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: financeguard-dev

# Generate configmap for dev environment settings
configMapGenerator:
  - name: backend-config
    literals:
      - ENVIRONMENT=dev
      - SKIP_AUTH_VERIFICATION=true
      - CLERK_JWKS_URL=https://api.clerk.com/v1

# Patches to modify Helm charts or base resources
patches:
  - target:
      kind: Deployment
      name: .*backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: 123456789012.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend:dev-latest

  - target:
      kind: Deployment
      name: .*frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: 123456789012.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend:dev-latest
