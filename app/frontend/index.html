<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceGuard - Secure DevSecOps Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 4px; }
        .glass { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="h-full flex flex-col font-sans">

    <header class="sticky top-0 z-50 border-b border-slate-800 bg-slate-950/90 backdrop-blur">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-tr from-indigo-600 to-cyan-500 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-white"></i>
                </div>
                <span class="text-2xl font-bold tracking-tight">FinanceGuard</span>
            </div>
            <button onclick="toggleSettings()" class="px-4 py-2 text-sm bg-slate-900 hover:bg-slate-800 rounded-lg border border-slate-700">
                <i class="fa-solid fa-sliders mr-2"></i> Settings
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-6 py-8">
        
        <div id="connection-warning" class="hidden mb-6 p-4 rounded-xl border border-amber-900 bg-amber-950/30 text-amber-300 flex items-center gap-3">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Backend unreachable. Using offline data.</span>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="glass p-5 rounded-2xl">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-slate-400 uppercase tracking-wider">Total Net Balance</span>
                    <div class="w-8 h-8 bg-indigo-600/20 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-scale-balanced text-indigo-400 text-xs"></i>
                    </div>
                </div>
                <p id="stat-balance" class="text-2xl font-bold text-white">$0.00</p>
                <p class="text-xs text-slate-500 mt-2 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full inline-block"></span>
                    Live updates &middot; synchronized securely
                </p>
            </div>
            <div class="glass p-5 rounded-2xl">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-slate-400 uppercase tracking-wider">Monthly Inflow</span>
                    <div class="w-8 h-8 bg-emerald-600/20 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-arrow-trend-up text-emerald-400 text-xs"></i>
                    </div>
                </div>
                <p id="stat-inflow" class="text-2xl font-bold text-emerald-400">$0.00</p>
                <p class="text-xs text-slate-500 mt-2 flex items-center gap-1">
                    <i class="fa-solid fa-lock text-slate-600 text-xs"></i>
                    Clerk Secured &middot; Audit trail logging
                </p>
            </div>
            <div class="glass p-5 rounded-2xl">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-slate-400 uppercase tracking-wider">Monthly Outflow</span>
                    <div class="w-8 h-8 bg-rose-600/20 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-arrow-trend-down text-rose-400 text-xs"></i>
                    </div>
                </div>
                <p id="stat-outflow" class="text-2xl font-bold text-rose-400">$0.00</p>
                <p class="text-xs text-slate-500 mt-2 flex items-center gap-1">
                    <i class="fa-solid fa-shield-halved text-slate-600 text-xs"></i>
                    RDS Secured &middot; Encrypted at rest
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Add Transaction Form -->
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-plus text-indigo-400"></i> New Transaction
                </h2>
                
                <form id="tx-form">
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-slate-400">Description</label>
                            <input id="tx-desc" type="text" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs text-slate-400">Amount</label>
                                <input id="tx-amount" type="number" step="0.01" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm">
                            </div>
                            <div>
                                <label class="text-xs text-slate-400">Category</label>
                                <input id="tx-cat" type="text" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">Type</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2">
                                    <input type="radio" name="tx-type" value="income" checked> Income
                                </label>
                                <label class="flex items-center gap-2">
                                    <input type="radio" name="tx-type" value="expense"> Expense
                                </label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="mt-6 w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-semibold">
                        Post Secured Entry
                    </button>
                </form>
            </div>

            <!-- Transaction Table -->
            <div class="lg:col-span-2 glass p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Secure Ledger Logs</h2>
                    <button onclick="fetchTransactions()" class="px-4 py-1.5 text-sm bg-slate-800 hover:bg-slate-700 rounded-lg">Refresh</button>
                </div>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="py-2 text-left">Description</th>
                            <th class="py-2 text-left">Category</th>
                            <th class="py-2 text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="tx-tbody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // ==================== CONFIG ====================
       let API_URL = localStorage.getItem("FG_API_URL") || 
              "http://k8s-dev-financeg-4fddf1bc8c-49026185.us-east-1.elb.amazonaws.com";
        let transactions = [];

        function showToast(msg) {
            console.log("[TOAST]", msg);
            const toast = document.createElement("div");
            toast.style.cssText = "position:fixed;bottom:20px;right:20px;background:#1e2937;color:white;padding:12px 20px;border-radius:8px;z-index:9999;border:1px solid #374151";
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== FORM SUBMIT WITH DEBUG ====================
        async function handleFormSubmit(event) {
            event.preventDefault();
            console.log("%c[DEBUG] Form submitted!", "color: lime; font-weight: bold");

            const submitBtn = event.target.querySelector('button[type="submit"]');
            if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Sending…"; }

            const desc = document.getElementById("tx-desc").value.trim();
            const amountInput = parseFloat(document.getElementById("tx-amount").value);
            const category = document.getElementById("tx-cat").value.trim();

            const typeInput = document.querySelector('input[name="tx-type"]:checked');
            if (!typeInput) {
                console.error("[DEBUG] Error: No transaction type selected.");
                showToast("Please select a transaction type.");
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Post Secured Entry"; }
                return;
            }
            const type = typeInput.value;
            const amount = type === "expense" ? -Math.abs(amountInput) : Math.abs(amountInput);

            console.log("[DEBUG] Payload preparing...", { desc, amount, category, type, API_URL });

            try {
                console.log("[DEBUG] Sending POST to:", `${API_URL}/api/v1/transactions`);

                const res = await fetch(`${API_URL}/api/v1/transactions`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer mock-token-dev-sec-ops"
                    },
                    body: JSON.stringify({ description: desc, amount, category, type })
                });

                console.log("[DEBUG] Response status:", res.status);

                if (res.ok) {
                    const data = await res.json();
                    console.log("%c[DEBUG] SUCCESS - Saved transaction:", "color: lime", data);
                    showToast("Transaction saved successfully!");
                    document.getElementById("tx-form").reset();
                    await fetchTransactions();
                } else {
                    const text = await res.text();
                    let detail = res.status;
                    try { detail = JSON.parse(text).detail || res.status; } catch (_) { detail = text || res.status; }
                    console.error("[DEBUG] Backend error:", res.status, text);
                    showToast("Failed: " + detail);
                }
            } catch (err) {
                console.error("[DEBUG] Network/fetch error:", err);
                showToast("Cannot reach backend: " + err.message);
            } finally {
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Post Secured Entry"; }
            }
        }

        async function fetchTransactions() {
            try {
                console.log("[DEBUG] Fetching transactions from:", `${API_URL}/api/v1/transactions`);
                const res = await fetch(`${API_URL}/api/v1/transactions`, {
                    headers: {
                        "Authorization": "Bearer mock-token-dev-sec-ops" // Crucial fix for HTTPBearer 403 Forbidden!
                    }
                });
                console.log("[DEBUG] Fetch response status:", res.status);
                if (res.ok) {
                    transactions = await res.json();
                    console.log("[DEBUG] Fetched transactions successfully:", transactions);
                    renderTransactions();
                } else {
                    console.error("[DEBUG] Fetch failed with status:", res.status);
                }
            } catch (e) {
                console.error("[DEBUG] Fetch failed:", e);
            }
        }

        function renderStats() {
            const balance = transactions.reduce((s, t) => s + t.amount, 0);
            const inflow  = transactions.reduce((s, t) => s + (t.amount > 0 ? t.amount : 0), 0);
            const outflow = transactions.reduce((s, t) => s + (t.amount < 0 ? Math.abs(t.amount) : 0), 0);
            document.getElementById("stat-balance").textContent = (balance < 0 ? "-" : "") + "$" + Math.abs(balance).toFixed(2);
            document.getElementById("stat-balance").className = "text-2xl font-bold " + (balance < 0 ? "text-rose-400" : "text-white");
            document.getElementById("stat-inflow").textContent  = "$" + inflow.toFixed(2);
            document.getElementById("stat-outflow").textContent = "$" + outflow.toFixed(2);
        }

        function renderTransactions() {
            renderStats();
            const tbody = document.getElementById("tx-tbody");
            tbody.innerHTML = "";
            if (!transactions.length) {
                tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-slate-500">No transactions yet</td></tr>`;
                return;
            }
            transactions.forEach(tx => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td class="py-3 px-4">${tx.description}</td>
                    <td class="py-3 px-4">${tx.category}</td>
                    <td class="py-3 px-4 text-right font-mono ${tx.amount < 0 ? 'text-rose-400' : 'text-emerald-400'}">
                        ${tx.amount < 0 ? '-' : '+'}$${Math.abs(tx.amount).toFixed(2)}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function toggleSettings() {
            const url = prompt("Backend API URL:", API_URL);
            if (url) {
                API_URL = url;
                localStorage.setItem("FG_API_URL", url);
                alert("Saved. Please reload the page.");
            }
        }

        function init() {
            console.log("%c[FinanceGuard] Initializing. API_URL =", "color: cyan", API_URL);

            const form = document.getElementById("tx-form");
            if (form) {
                form.addEventListener("submit", handleFormSubmit);
                console.log("[FinanceGuard] Submit listener registered on #tx-form.");
            } else {
                console.error("[FinanceGuard] CRITICAL: #tx-form not found in DOM!");
            }

            fetchTransactions();
        }

        // Guard handles the rare case where the script runs after DOMContentLoaded
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
    </script>
</body>
</html>
