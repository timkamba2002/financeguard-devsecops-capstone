name: FinanceGuard CI/CD — Trunk-Based (Model B)

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  TRUNK-BASED DEVELOPMENT (Model B)                                       ║
# ║                                                                           ║
# ║  Branch strategy:                                                         ║
# ║    main        — single source of truth, protected                       ║
# ║    feature/*   — short-lived, branch from main, PR to main               ║
# ║    fix/*       — same as feature branches                                ║
# ║                                                                           ║
# ║  Promotion strategy:                                                      ║
# ║    Environments are NOT separate git branches.                           ║
# ║    The same commit SHA flows dev → staging → prod via GitHub             ║
# ║    Environment approval gates (namespace + values file change only).     ║
# ║                                                                           ║
# ║  Flow:                                                                    ║
# ║    feature/* → PR → [Stage 0: PR Validation] → merge to main            ║
# ║    main push → [Stage 1: Build & Sign] → [Stage 2: Dev auto]             ║
# ║             → [Stage 3: Staging ✋ approval] → [Stage 4: Prod ✋ approval] ║
# ║             → [Stage 5: Evidence bundle + Release]                       ║
# ║                                                                           ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  DEMO vs PRODUCTION GATING — key principle                               ║
# ║                                                                           ║
# ║  Every security scan step is annotated:                                  ║
# ║    # DEMO: continue-on-error: true                                       ║
# ║    #   → scan runs, SARIF uploaded, pipeline stays GREEN                 ║
# ║    # PRODUCTION: remove continue-on-error — hard fail required          ║
# ║    #   → describes what the gate enforces in a real production env       ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  866934333672.dkr.ecr.us-east-1.amazonaws.com
  ECR_BACKEND:   866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
  ECR_FRONTEND:  866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  EKS_CLUSTER:   financeguard-eks-dev
  CHART_REPO:    oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 0 · PR VALIDATION
#  Runs on every pull_request targeting main.
#  These are the merge gatekeepers — enforced via branch protection rules.
#  See docs/branch-protection.md for setup.
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  pr-secret-scan:
    name: "PR · Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history — Gitleaks scans all commits in the PR

      # DEMO: continue-on-error keeps the PR check green even if secrets are found.
      # PRODUCTION: remove continue-on-error. A leaked secret in a PR MUST block
      # the merge. Secrets in git history cannot be un-leaked.
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  pr-sast:
    name: "PR · SAST — Semgrep (primary)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - run: pip install semgrep

      # DEMO: continue-on-error keeps the PR check green.
      # PRODUCTION: remove continue-on-error. HIGH/CRITICAL Semgrep findings
      # (SQL injection, hardcoded credentials, broken authentication) MUST
      # block the merge before vulnerable code reaches main.
      - name: "Semgrep SAST (OWASP Top-10 + secrets + security-audit)"
        run: |
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            app/backend/
        continue-on-error: true   # DEMO ONLY — remove for production

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category:   semgrep-pr

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           pr-semgrep-${{ github.sha }}
          path:           semgrep.sarif
          retention-days: 30

  pr-iac-scan:
    name: "PR · IaC Scan (Checkov + TFLint)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # DEMO: continue-on-error keeps the PR check green.
      # PRODUCTION: remove continue-on-error. Critical Terraform misconfigs
      # (open S3, unencrypted RDS, 0.0.0.0/0 security groups) MUST block
      # the merge — they reach production infra unchanged.
      - name: "Checkov — Terraform IaC scan"
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          directory:        terraform/
          framework:        terraform
          soft_fail:        true
          output_format:    sarif
          output_file_path: checkov.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category:   checkov-pr

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - run: terraform init -backend=false
        working-directory: ./terraform

      - uses: terraform-linters/setup-tflint@v4

      # DEMO: continue-on-error keeps the PR check green.
      # PRODUCTION: remove continue-on-error. TFLint errors signal deprecated
      # API usage and provider rule violations that cause runtime failures.
      - name: "TFLint — provider rules"
        run: |
          tflint --init
          tflint --format compact
        working-directory: ./terraform
        continue-on-error: true   # DEMO ONLY — remove for production

  pr-test:
    name: "PR · Unit Tests & Coverage"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: |
          pip install -r app/backend/requirements.txt
          pip install pytest pytest-cov black

      - name: "Lint — Black"
        run: black --check app/backend/

      # Tests ALWAYS hard fail — no continue-on-error.
      # A failing test MUST NOT merge to main. No exceptions.
      - name: "pytest + coverage"
        run: |
          pytest app/backend/tests/ \
            --junitxml=test-results/junit.xml \
            --cov=app/backend \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/coverage-html/ \
            -v
        env:
          DATABASE_URL: sqlite:///./test.db

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          Unit Test Results (PR)
          path:          test-results/junit.xml
          reporter:      java-junit
          fail-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           pr-test-results-${{ github.sha }}
          path:           test-results/
          retention-days: 30

  pr-sonarcloud:
    name: "PR · SonarCloud Quality Gate"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: pr-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: pr-test-results-${{ github.sha }}
          path: test-results/

      # DEMO: continue-on-error keeps the PR check green.
      # PRODUCTION: remove continue-on-error. Failing quality gate (coverage
      # drop, new security hotspot, rating D/E) MUST block the merge.
      - uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 1 · BUILD, SCAN, SIGN & PUSH  (main branch only)
#
#  Triggered when a PR merges to main.
#  Produces immutable Docker images tagged with the commit SHA.
#  These exact images (not rebuilt) flow through every environment.
#  Trivy scans each image; Syft generates SBOMs; cosign signs both.
#  Helm charts are packaged and pushed to ECR OCI.
# ─────────────────────────────────────────────────────────────────────────────

  build-sign-push:
    name: "Stage 1 · Build, Scan, Sign & Push"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token:        write    # required for OIDC cosign keyless signing
      contents:        read
    outputs:
      chart-version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: ver
        run: echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # ── Backend ────────────────────────────────────────────────────────────
      - name: "Build backend image (GHA layer cache)"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/backend
          load:       true
          push:       false
          tags:       financeguard-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # DEMO: continue-on-error prevents build failure on vulnerabilities.
      # PRODUCTION: remove continue-on-error. A CRITICAL/HIGH fixable CVE MUST
      # block the push — a vulnerable image in ECR can be deployed anywhere.
      - name: "Trivy — backend (CRITICAL/HIGH fixable CVEs)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-backend:${{ github.sha }}
          format:         sarif
          output:         trivy-backend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "Syft SBOM — backend (SPDX 2.3)"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-backend:${{ github.sha }}
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json
          output-file:   sbom-backend.spdx.json

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: "Build frontend image (GHA layer cache)"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/frontend
          load:       true
          push:       false
          tags:       financeguard-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # DEMO: continue-on-error prevents build failure on vulnerabilities.
      # PRODUCTION: remove continue-on-error. Same gate as backend.
      - name: "Trivy — frontend (CRITICAL/HIGH fixable CVEs)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-frontend:${{ github.sha }}
          format:         sarif
          output:         trivy-frontend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "Syft SBOM — frontend (SPDX 2.3)"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-frontend:${{ github.sha }}
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json
          output-file:   sbom-frontend.spdx.json

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy

      # ── Push to ECR ────────────────────────────────────────────────────────
      - name: "Push backend to ECR"
        run: |
          docker tag financeguard-backend:${{ github.sha }} ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }} ${{ env.ECR_BACKEND }}:latest
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ env.ECR_BACKEND }}:latest

      - name: "Push frontend to ECR"
        run: |
          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:latest
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.ECR_FRONTEND }}:latest

      # ── Cosign keyless image signing ───────────────────────────────────────
      # No keys to rotate — GitHub Actions OIDC token is the identity.
      # Identity recorded in public transparency log:
      #   https://github.com/<repo>/.github/workflows/ci-cd.yml@refs/heads/main
      # Signature stored as an OCI artifact in ECR alongside the image.
      #
      # DEMO: continue-on-error so the pipeline continues if signing fails.
      # PRODUCTION: remove continue-on-error. An unsigned image reaching a
      # deploy job is a supply-chain integrity failure — MUST hard fail.
      - uses: sigstore/cosign-installer@v3

      - name: "Cosign sign backend image (OIDC keyless)"
        run: cosign sign --yes ${{ env.ECR_BACKEND }}:${{ github.sha }}
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Cosign sign frontend image (OIDC keyless)"
        run: cosign sign --yes ${{ env.ECR_FRONTEND }}:${{ github.sha }}
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── ECR lifecycle policies ─────────────────────────────────────────────
      - name: "Apply ECR lifecycle policies"
        run: |
          for repo in financeguard-backend financeguard-frontend; do
            aws ecr put-lifecycle-policy \
              --repository-name "$repo" \
              --lifecycle-policy-text '{
                "rules": [
                  {
                    "rulePriority": 1,
                    "description": "Expire untagged images after 14 days",
                    "selection": {"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":14},
                    "action": {"type":"expire"}
                  },
                  {
                    "rulePriority": 2,
                    "description": "Keep only 20 most recent stable-tagged images",
                    "selection": {"tagStatus":"tagged","tagPrefixList":["stable"],"countType":"imageCountMoreThan","countNumber":20},
                    "action": {"type":"expire"}
                  }
                ]
              }'
          done

      # ── Helm package & push ────────────────────────────────────────────────
      - name: "Package Helm charts"
        run: |
          helm package helm/backend \
            --version ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/
          helm package helm/frontend \
            --version ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/

      - name: "Ensure chart ECR repositories exist"
        run: |
          for repo in charts/backend charts/frontend; do
            aws ecr describe-repositories --repository-names "$repo" 2>/dev/null || \
              aws ecr create-repository --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true
          done

      - name: "Push Helm charts to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          helm push dist/backend-${{ steps.ver.outputs.version }}.tgz  ${{ env.CHART_REPO }}
          helm push dist/frontend-${{ steps.ver.outputs.version }}.tgz ${{ env.CHART_REPO }}

      # ── Upload artifacts ───────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           trivy-sarif-${{ github.sha }}
          path: |
            trivy-backend.sarif
            trivy-frontend.sarif
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name:           helm-charts-${{ github.sha }}
          path:           dist/*.tgz
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 2 · DEPLOY TO DEV  (automatic — no approval)
#
#  `dev` GitHub Environment has no required reviewers → auto-deploys.
#  cosign verify confirms the image was signed by this pipeline.
#  helm diff previews exact Kubernetes resource changes before applying.
#  --atomic auto-rolls back on timeout or crash-loop.
# ─────────────────────────────────────────────────────────────────────────────

  deploy-dev:
    name: "Stage 2 · Deploy → Dev (auto)"
    runs-on: ubuntu-latest
    needs: build-sign-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev    # no required reviewers → deploys automatically
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # ── Cosign verification ────────────────────────────────────────────────
      # Confirms the image was built and signed by THIS CI pipeline.
      # Without this, a manually-built or tampered image could silently deploy.
      #
      # DEMO: continue-on-error so the deploy proceeds even without signature.
      # PRODUCTION: remove continue-on-error. An unsigned image MUST NOT deploy.
      - uses: sigstore/cosign-installer@v3

      - name: "Cosign verify — backend + frontend"
        run: |
          {
            echo "=== Backend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_BACKEND }}:${{ github.sha }}
            echo "=== Frontend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          } 2>&1 | tee cosign-verify-dev.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── Helm deploy ────────────────────────────────────────────────────────
      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "helm diff — backend (dev)"
        run: |
          helm diff upgrade financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev \
            -f helm/backend/values.yaml -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-dev.txt || true

      - name: "helm upgrade — backend → dev (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: "helm diff — frontend (dev)"
        run: |
          helm diff upgrade financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev \
            -f helm/frontend/values.yaml -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-dev.txt || true

      - name: "helm upgrade — frontend → dev (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           cosign-verify-dev-${{ github.sha }}
          path:           cosign-verify-dev.txt
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           helm-diff-dev-${{ github.sha }}
          path:           "helm-diff-*-dev.txt"
          retention-days: 30

  integration-test-dev:
    name: "Stage 2 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html

      - name: "Integration tests vs live dev cluster"
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (dev)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-dev-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  zap-dev:
    name: "Stage 2 · DAST — ZAP Baseline (dev, report only)"
    runs-on: ubuntu-latest
    needs: integration-test-dev
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      # Dev ZAP is passive (spider + passive rules, no active attack payloads).
      # Purpose: early visibility. The active scan that gates prod is in staging.
      #
      # DEMO: continue-on-error + fail_action: false — pipeline always continues.
      # PRODUCTION: keep fail_action: false here (dev is observation-only).
      # The staging full scan below is where fail_action: true should be set.
      - name: "DAST — OWASP ZAP baseline (dev, passive)"
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false    # dev = report only; hard gate is in staging
          artifact_name: zap-baseline-dev-${{ github.sha }}

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 3 · PROMOTE TO STAGING  (manual approval via GitHub Environments)
#
#  The `staging` Environment has required reviewers configured.
#  Pipeline pauses until you click Approve in the GitHub Actions UI.
#  The same commit SHA that passed dev is deployed to the staging namespace.
#  No rebuild. Only the namespace + values overlay changes.
#
#  After deploy: full ZAP active scan (real attack payloads, last gate before prod).
# ─────────────────────────────────────────────────────────────────────────────

  deploy-staging:
    name: "Stage 3 · Deploy → Staging (approval required ✋)"
    runs-on: ubuntu-latest
    needs: [ integration-test-dev, zap-dev ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging    # ← PAUSES HERE — Approve in GitHub Environments UI
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # DEMO: continue-on-error keeps staging green without a valid signature.
      # PRODUCTION: remove continue-on-error. An unsigned image MUST NOT deploy.
      - uses: sigstore/cosign-installer@v3

      - name: "Cosign verify — backend + frontend"
        run: |
          {
            echo "=== Backend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_BACKEND }}:${{ github.sha }}
            echo "=== Frontend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          } 2>&1 | tee cosign-verify-staging.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "helm diff — backend (staging)"
        run: |
          helm diff upgrade financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging \
            -f helm/backend/values.yaml -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-staging.txt || true

      - name: "helm upgrade — backend → staging (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: "helm diff — frontend (staging)"
        run: |
          helm diff upgrade financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging \
            -f helm/frontend/values.yaml -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-staging.txt || true

      - name: "helm upgrade — frontend → staging (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           cosign-verify-staging-${{ github.sha }}
          path:           cosign-verify-staging.txt
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           helm-diff-staging-${{ github.sha }}
          path:           "helm-diff-*-staging.txt"
          retention-days: 30

  integration-test-staging:
    name: "Stage 3 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html

      - name: "Integration tests vs live staging cluster"
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (staging)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-staging-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  zap-staging:
    name: "Stage 3 · DAST — ZAP Full Scan (staging, last gate before prod)"
    runs-on: ubuntu-latest
    needs: integration-test-staging
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      # Full/active scan — real injection, XSS, broken auth payloads.
      # This is the LAST security gate between staging and production.
      #
      # DEMO: continue-on-error + fail_action: false — pipeline stays green.
      # PRODUCTION: remove continue-on-error AND set fail_action: true.
      # Any HIGH ZAP finding here MUST block the production promotion.
      - name: "DAST — OWASP ZAP full scan (staging, active)"
        uses: zaproxy/action-full-scan@v0.10.0
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false    # DEMO ONLY — set to true in production
          artifact_name: zap-full-staging-${{ github.sha }}

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 4 · PRODUCTION APPROVAL GATE + DEPLOY
#
#  The `production` Environment requires manual approval.
#  Pipeline pauses — click Approve in the GitHub Actions UI.
#  GitHub records WHO approved and WHEN (audit trail).
#
#  The same commit SHA that passed all staging checks deploys to prod.
#  Nothing is rebuilt. Cosign verifies the signed image from Stage 1.
# ─────────────────────────────────────────────────────────────────────────────

  deploy-prod:
    name: "Stage 4 · Deploy → Production (approval required ✋)"
    runs-on: ubuntu-latest
    needs: [ integration-test-staging, zap-staging ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # ← PAUSES HERE — Approve in GitHub Environments UI
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # DEMO: continue-on-error prevents hard failure on missing signature.
      # PRODUCTION: remove continue-on-error. An unsigned image in production
      # is a critical supply-chain integrity failure. MUST hard fail.
      - uses: sigstore/cosign-installer@v3

      - name: "Cosign verify — backend + frontend (pre-prod)"
        run: |
          {
            echo "=== Backend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_BACKEND }}:${{ github.sha }}
            echo "=== Frontend ==="
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          } 2>&1 | tee cosign-verify-prod.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "helm diff — backend (production)"
        run: |
          helm diff upgrade financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod \
            -f helm/backend/values.yaml -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-prod.txt || true

      - name: "helm upgrade — backend → production (--atomic 10m)"
        run: |
          helm upgrade --install financeguard-backend \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      - name: "helm diff — frontend (production)"
        run: |
          helm diff upgrade financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod \
            -f helm/frontend/values.yaml -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-prod.txt || true

      - name: "helm upgrade — frontend → production (--atomic 10m)"
        run: |
          helm upgrade --install financeguard-frontend \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      # ── Post-deployment smoke test ─────────────────────────────────────────
      - name: "Post-deploy smoke test (2 min retry)"
        run: |
          HOST=$(kubectl get ingress -n prod \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "Production: http://$HOST"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/health" || echo "000")
            [ "$STATUS" = "200" ] && { echo "✅ /health → 200 (attempt $i)"; break; }
            echo "⏳ attempt $i/12 → HTTP $STATUS"
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "❌ Smoke test timed out after 2 minutes"; exit 1; }

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/api/v1/transactions" || echo "000")
          [ "$STATUS" = "200" ] || { echo "❌ /api/v1/transactions → HTTP $STATUS"; exit 1; }
          echo "✅ Production healthy — /health and /api/v1/transactions both 200"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           cosign-verify-prod-${{ github.sha }}
          path:           cosign-verify-prod.txt
          retention-days: 90

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           helm-diff-prod-${{ github.sha }}
          path:           "helm-diff-*-prod.txt"
          retention-days: 90

# ─────────────────────────────────────────────────────────────────────────────
#  STAGE 5 · EVIDENCE BUNDLE + GITHUB RELEASE
#
#  Aggregates ALL pipeline artifacts into a single downloadable bundle.
#  Retained 90 days. Use for capstone submission / audit trail.
#
#  Bundle layout:
#    evidence/
#    ├── manifest.json                    pipeline metadata + tool inventory
#    ├── security/                        Semgrep SARIF, Trivy SARIFs
#    ├── tests/
#    │   ├── unit/                        JUnit XML, coverage XML + HTML
#    │   ├── integration-dev/
#    │   └── integration-staging/
#    ├── sbom/                            backend + frontend SPDX JSON
#    ├── signatures/                      cosign verify output (dev/staging/prod)
#    └── deployment/
#        ├── helm-diff-dev/               exact K8s changes per environment
#        ├── helm-diff-staging/
#        ├── helm-diff-prod/
#        ├── helm-history-backend.txt
#        ├── helm-history-frontend.txt
#        └── charts/                      packaged Helm .tgz files
# ─────────────────────────────────────────────────────────────────────────────

  evidence-release:
    name: "Stage 5 · Evidence Bundle + Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Download all pipeline artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: "Assemble evidence bundle"
        run: |
          mkdir -p evidence/{security,tests/{unit,integration-dev,integration-staging},sbom,signatures,deployment/{helm-diff-dev,helm-diff-staging,helm-diff-prod,charts}}

          cp -r artifacts/pr-semgrep-*/              evidence/security/                   2>/dev/null || true
          cp -r artifacts/trivy-sarif-*/             evidence/security/                   2>/dev/null || true
          cp -r artifacts/pr-test-results-*/         evidence/tests/unit/                 2>/dev/null || true
          cp -r artifacts/integration-results-dev-*/ evidence/tests/integration-dev/     2>/dev/null || true
          cp -r artifacts/integration-results-staging-*/ evidence/tests/integration-staging/ 2>/dev/null || true
          find artifacts/ -name "*.spdx.json"        -exec cp {} evidence/sbom/ \;       2>/dev/null || true
          cp -r artifacts/cosign-verify-dev-*/       evidence/signatures/                 2>/dev/null || true
          cp -r artifacts/cosign-verify-staging-*/   evidence/signatures/                 2>/dev/null || true
          cp -r artifacts/cosign-verify-prod-*/      evidence/signatures/                 2>/dev/null || true
          cp -r artifacts/helm-diff-dev-*/           evidence/deployment/helm-diff-dev/   2>/dev/null || true
          cp -r artifacts/helm-diff-staging-*/       evidence/deployment/helm-diff-staging/ 2>/dev/null || true
          cp -r artifacts/helm-diff-prod-*/          evidence/deployment/helm-diff-prod/  2>/dev/null || true
          cp -r artifacts/helm-charts-*/             evidence/deployment/charts/           2>/dev/null || true

          helm history financeguard-backend  -n prod --max 10 --output table \
            > evidence/deployment/helm-history-backend.txt  2>/dev/null || true
          helm history financeguard-frontend -n prod --max 10 --output table \
            > evidence/deployment/helm-history-frontend.txt 2>/dev/null || true

          cat > evidence/manifest.json << EOF
          {
            "project":       "FinanceGuard DevSecOps Capstone",
            "model":         "Trunk-Based Development (Model B)",
            "version":       "v0.1.${{ github.run_number }}",
            "commit":        "${{ github.sha }}",
            "branch":        "main",
            "actor":         "${{ github.actor }}",
            "pipeline_url":  "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "security_toolchain": {
              "secret_scan":        "Gitleaks — full git history, every PR",
              "sast_primary":       "Semgrep — OWASP Top-10 + secrets + security-audit",
              "iac_scan":           "Checkov + TFLint — Terraform misconfigs + provider rules",
              "code_quality":       "SonarCloud — coverage, hotspots, quality rating",
              "container_scan":     "Trivy — CRITICAL/HIGH fixable CVEs (OS + libraries)",
              "sbom":               "Syft — SPDX 2.3 JSON for each image",
              "image_signing":      "Cosign OIDC keyless — Sigstore Fulcio/Rekor transparency log",
              "dast_dev":           "OWASP ZAP baseline — passive, report only",
              "dast_staging":       "OWASP ZAP full scan — active attack payloads, last gate",
              "policy_as_code":     "Kyverno ClusterPolicies — non-root, resource limits, ECR-only registry",
              "runtime_detection":  "Falco eBPF — shell-in-container, unexpected outbound, sensitive files",
              "secrets_management": "AWS Secrets Manager + External Secrets Operator (IRSA)"
            },
            "environments": {
              "dev":        "auto-deploy after build passes (namespace: dev)",
              "staging":    "manual approval via GitHub Environments (namespace: staging)",
              "production": "manual approval via GitHub Environments (namespace: prod)"
            },
            "demo_note": "All security scans run with continue-on-error: true for demo. In production, remove this flag to enforce hard gates on CRITICAL/HIGH findings."
          }
          EOF

          echo "── Evidence bundle ──"
          find evidence/ -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name:           "EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}-${{ github.sha }}"
          path:           evidence/
          retention-days: 90

      # ── :stable tag ────────────────────────────────────────────────────────
      - name: "Retag backend → :stable"
        run: |
          M=$(aws ecr batch-get-image --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend --image-tag stable \
            --image-manifest "$M"

      - name: "Retag frontend → :stable"
        run: |
          M=$(aws ecr batch-get-image --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend --image-tag stable \
            --image-manifest "$M"

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: "Create GitHub Release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "## FinanceGuard v0.1.${{ github.run_number }}

          **Commit:** \`${{ github.sha }}\`
          **Pipeline:** [Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Model:** Trunk-Based Development — single \`main\` branch

          ### Images
          \`\`\`
          ${{ env.ECR_BACKEND }}:${{ github.sha }}   (also :stable)
          ${{ env.ECR_FRONTEND }}:${{ github.sha }}  (also :stable)
          \`\`\`

          ### Security toolchain
          | Tool | Purpose | Mode |
          |---|---|---|
          | Gitleaks | Secrets in git history | demo: warn |
          | Semgrep | OWASP Top-10 SAST (PR gate) | demo: warn |
          | Checkov + TFLint | IaC misconfigs (PR gate) | demo: warn |
          | SonarCloud | Code quality gate (PR gate) | demo: warn |
          | Trivy | CRITICAL/HIGH CVEs in images | demo: warn |
          | Syft | SBOM (SPDX 2.3 format) | artifact |
          | Cosign | OIDC keyless sign + verify | demo: warn |
          | ZAP baseline | Passive DAST (dev) | report only |
          | ZAP full scan | Active DAST (staging) | demo: warn |
          | Kyverno | Policy-as-Code on cluster | enforce |
          | Falco | Runtime threat detection | enforce |
          | ESO | Secrets from AWS SM | active |

          📦 Download **EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}** for submission." \
            artifacts/helm-charts-${{ github.sha }}/*.tgz

# ─────────────────────────────────────────────────────────────────────────────
#  NOTIFY · Slack alert on production failure
# ─────────────────────────────────────────────────────────────────────────────

  notify-failure:
    name: "Notify · Production Failure"
    runs-on: ubuntu-latest
    needs: [ deploy-prod, evidence-release ]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.deploy-prod.result == 'failure' || needs.evidence-release.result == 'failure')
    steps:
      - uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *FinanceGuard production deployment FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version", "value": "v0.1.${{ github.run_number }}", "short": true},
                  {"title": "Commit",  "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor",   "value": "${{ github.actor }}", "short": true},
                  {"title": "deploy-prod",      "value": "${{ needs.deploy-prod.result }}", "short": true},
                  {"title": "evidence-release", "value": "${{ needs.evidence-release.result }}", "short": true},
                  {"title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true   # don't fail if Slack isn't configured yet
