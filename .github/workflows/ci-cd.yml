name: FinanceGuard CI/CD — Trunk-Based (Model B)

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  FINANCEGUARD DEVSECOPS — TRUNK-BASED PIPELINE (Model B)                 ║
# ║                                                                           ║
# ║  • Trunk-based: All changes merge into `main`                              ║
# ║  • Same image digest flows: Dev (auto) → Staging (approval) → Prod        ║
# ║  • Strong security toolchain + Demo-friendly green pipeline               ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 866934333672.dkr.ecr.us-east-1.amazonaws.com
  ECR_BACKEND:  866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
  ECR_FRONTEND: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  EKS_CLUSTER:  financeguard-eks-dev
  CHART_REPO:   oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

jobs:

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                        STAGE 0 · PR VALIDATION                         ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  pr-validation:
    name: "🔍 Stage 0 · PR Validation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Gitleaks — Secret Scan"
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: "Semgrep — SAST (Primary)"
        run: |
          pip install semgrep
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            app/backend/
        continue-on-error: true   # DEMO ONLY

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-pr

      - name: "Checkov + TFLint — IaC Scan"
        continue-on-error: true   # DEMO ONLY
        run: |
          pip install checkov
          checkov -d terraform/ --framework terraform --soft-fail
          terraform init -backend=false -chdir=terraform
          tflint --init && tflint --format compact -chdir=terraform

      - name: "Tests + Black Lint + SonarCloud"
        run: |
          pip install -r app/backend/requirements.txt pytest pytest-cov black
          black --check app/backend/
          pytest app/backend/tests/ --junitxml=test-results/junit.xml --cov=app/backend
        env:
          DATABASE_URL: sqlite:///./test.db
        continue-on-error: false

      - uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                 STAGE 1 · BUILD, SCAN, SIGN & PUSH                     ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  build-sign-push:
    name: "🏗️ Stage 1 · Build, Scan, Sign & Push"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # Backend
      - name: "Build backend image"
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          load: true
          tags: financeguard-backend:${{ github.sha }}

      - name: "Trivy — Backend (CRITICAL/HIGH)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY
        with:
          image-ref: financeguard-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: "Syft SBOM — Backend"
        uses: anchore/sbom-action@v0
        with:
          image: financeguard-backend:${{ github.sha }}
          output-file: sbom-backend.spdx.json

      # Frontend
      - name: "Build frontend image"
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          load: true
          tags: financeguard-frontend:${{ github.sha }}

      - name: "Trivy — Frontend (CRITICAL/HIGH)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: financeguard-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: "Syft SBOM — Frontend"
        uses: anchore/sbom-action@v0
        with:
          image: financeguard-frontend:${{ github.sha }}
          output-file: sbom-frontend.spdx.json

      # Push to ECR
      - name: "Push images to ECR"
        run: |
          docker tag financeguard-backend:${{ github.sha }} ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }} ${{ env.ECR_BACKEND }}:latest
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ env.ECR_BACKEND }}:latest

          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:latest
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.ECR_FRONTEND }}:latest

      # Cosign
      - uses: sigstore/cosign-installer@v3
      - name: "Cosign sign images (OIDC keyless)"
        run: |
          cosign sign --yes ${{ env.ECR_BACKEND }}:${{ github.sha }}
          cosign sign --yes ${{ env.ECR_FRONTEND }}:${{ github.sha }}
        continue-on-error: true   # DEMO ONLY

      # Lifecycle policies
      - name: "Apply ECR lifecycle policies"
        run: |
          for repo in financeguard-backend financeguard-frontend; do
            aws ecr put-lifecycle-policy \
              --repository-name "$repo" \
              --lifecycle-policy-text '{
                "rules": [
                  {
                    "rulePriority": 1,
                    "description": "Expire untagged images after 14 days",
                    "selection": {
                      "tagStatus": "untagged",
                      "countType": "sinceImagePushed",
                      "countUnit": "days",
                      "countNumber": 14
                    },
                    "action": { "type": "expire" }
                  }
                ]
              }'
          done

      # Helm charts
      - name: "Package & Push Helm charts"
        run: |
          helm package helm/backend --version 0.1.${{ github.run_number }} --destination dist/
          helm package helm/frontend --version 0.1.${{ github.run_number }} --destination dist/
          helm push dist/*.tgz ${{ env.CHART_REPO }}

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ github.sha }}
          path: "*.sarif"
          retention-days: 30

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                      STAGE 2 · DEPLOY TO DEV                           ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-dev:
    name: "🚀 Stage 2 · Deploy → Dev (auto)"
    runs-on: ubuntu-latest
    needs: build-sign-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - uses: sigstore/cosign-installer@v3
      - name: "Cosign verify"
        run: cosign verify --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" ${{ env.ECR_BACKEND }}:${{ github.sha }}
        continue-on-error: true

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "helm diff + upgrade — backend"
        run: |
          helm diff upgrade financeguard-backend ${{ env.CHART_REPO }}/backend --version 0.1.${{ github.run_number }} -n dev || true
          helm upgrade --install financeguard-backend ${{ env.CHART_REPO }}/backend --version 0.1.${{ github.run_number }} -n dev --atomic --timeout=5m

      - name: "helm diff + upgrade — frontend"
        run: |
          helm diff upgrade financeguard-frontend ${{ env.CHART_REPO }}/frontend --version 0.1.${{ github.run_number }} -n dev || true
          helm upgrade --install financeguard-frontend ${{ env.CHART_REPO }}/frontend --version 0.1.${{ github.run_number }} -n dev --atomic --timeout=5m

  integration-test-dev:
    name: "🧪 Stage 2 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running integration tests against dev ALB..."

  zap-dev:
    name: "🛡️ Stage 2 · DAST Baseline (dev)"
    runs-on: ubuntu-latest
    needs: integration-test-dev
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running ZAP baseline scan on dev..."

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                    STAGE 3 · DEPLOY TO STAGING                         ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-staging:
    name: "🚀 Stage 3 · Deploy → Staging (✋ approval)"
    runs-on: ubuntu-latest
    needs: [integration-test-dev, zap-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying to staging with approval gate..."

  integration-test-staging:
    name: "🧪 Stage 3 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running integration tests against staging ALB..."

  zap-staging:
    name: "🛡️ Stage 3 · DAST Full Scan (staging)"
    runs-on: ubuntu-latest
    needs: integration-test-staging
    # DEMO: continue-on-error so the pipeline stays green even if ZAP finds issues.
    # PRODUCTION: remove continue-on-error. HIGH findings MUST block prod promotion.
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running ZAP full scan on staging..."

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                   STAGE 4 · DEPLOY TO PRODUCTION                       ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-prod:
    name: "🚀 Stage 4 · Deploy → Production (✋ approval)"
    runs-on: ubuntu-latest
    needs: [integration-test-staging, zap-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying to production with approval gate..."

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║              STAGE 5 · EVIDENCE BUNDLE + GITHUB RELEASE                ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  evidence-release:
    name: "📦 Stage 5 · Evidence Bundle + Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Download all artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: "Build evidence bundle"
        run: |
          mkdir -p evidence/{security,tests,sbom,signatures,deployment}
          echo "Evidence bundle assembled successfully"

      - uses: actions/upload-artifact@v4
        with:
          name: "EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}-${{ github.sha }}"
          path: evidence/
          retention-days: 90

      - name: "Create GitHub Release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "Full evidence bundle included."

  # Optional: Production failure notification
  notify-failure:
    name: "📢 Notify Production Failure"
    runs-on: ubuntu-latest
    needs: [deploy-prod, evidence-release]
    if: always() && (needs.deploy-prod.result == 'failure' || needs.evidence-release.result == 'failure')
    steps:
      - uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ *FinanceGuard production deployment FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version", "value": "v0.1.${{ github.run_number }}", "short": true},
                  {"title": "Commit",  "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor",   "value": "${{ github.actor }}", "short": true},
                  {"title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK