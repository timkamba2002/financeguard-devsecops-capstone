# kube-prometheus-stack Helm values
# Installs: Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics
#
# Install: helm upgrade --install prometheus-stack prometheus-community/kube-prometheus-stack \
#            --namespace monitoring --create-namespace -f this-file.yaml --version 58.2.1

# ── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "FinanceGuard2024!"  # change before production: use a K8s secret

  persistence:
    enabled: false   # EKS Fargate: no EBS StorageClass — use emptyDir (data lost on restart, fine for demo)

  # Pre-configured datasources: Prometheus, Loki, Tempo
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus   # links traces to service maps in Grafana
        tracesToLogs:
          datasourceUid: loki         # jump from trace to logs in Loki
          tags: [pod, namespace]

  # Sidecar that auto-discovers ConfigMaps labelled grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true

  # ALB Ingress — exposes Grafana publicly via the AWS Load Balancer Controller
  # After helm upgrade, get the URL with:
  #   kubectl get ingress -n monitoring -l app.kubernetes.io/name=grafana
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip          # required for Fargate
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
      alb.ingress.kubernetes.io/healthcheck-path: /api/health
    hosts: []   # ALB does not need a hostname — it assigns its own DNS
    path: /

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s"
    auth:
      disable_login_form: false
    # Unified alerting (replaces legacy alerting)
    unified_alerting:
      enabled: true

  resources:
    requests:
      cpu:    100m
      memory: 256Mi
    limits:
      cpu:    500m
      memory: 512Mi

# ── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "10GB"
    # storageSpec disabled — EKS Fargate cannot bind EBS PVCs (no EC2 nodes)
    # storageSpec:
    #   volumeClaimTemplate:
    #     spec:
    #       accessModes: [ ReadWriteOnce ]
    #       resources:
    #         requests:
    #           storage: 20Gi

    # Pick up ServiceMonitor, PrometheusRule resources in any namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Scrape financeguard workloads via pod annotations
    additionalScrapeConfigs:
      - job_name: financeguard-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [ dev, staging, prod ]
        relabel_configs:
          - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_scrape ]
            action: keep
            regex: "true"
          - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_path ]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [ __address__, __meta_kubernetes_pod_annotation_prometheus_io_port ]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

    resources:
      requests:
        cpu:    500m
        memory: 1Gi
      limits:
        cpu:    "2"
        memory: 2Gi

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    # storage disabled — EKS Fargate cannot bind EBS PVCs
    # storage:
    #   volumeClaimTemplate:
    #     spec:
    #       accessModes: [ ReadWriteOnce ]
    #       resources:
    #         requests:
    #           storage: 2Gi

    resources:
      requests:
        cpu:    50m
        memory: 64Mi
      limits:
        cpu:    100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
      # Slack global URL — set via:
      # kubectl create secret generic alertmanager-slack \
      #   --from-literal=slack_api_url=$SLACK_WEBHOOK_URL -n monitoring
      slack_api_url: ""    # populated from secret at deploy time

    route:
      group_by: [ alertname, namespace ]
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 12h
      receiver: slack-financeguard
      routes:
        - matchers: [ severity=critical ]
          receiver: slack-financeguard
          continue: true
        - matchers: [ namespace=prod ]
          receiver: slack-financeguard

    receivers:
      - name: slack-financeguard
        slack_configs:
          - channel: "#financeguard-alerts"
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
            send_resolved: true

    templates:
      - /etc/alertmanager/config/*.tmpl

# ── Kube state metrics & node exporter ───────────────────────────────────────
kube-state-metrics:
  enabled: true

# node-exporter uses a DaemonSet — disabled on EKS Fargate because Fargate
# has no EC2 nodes to schedule DaemonSet pods on.
nodeExporter:
  enabled: false

prometheus-node-exporter:
  enabled: false

# ── Default alert rules ───────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd:         true
    general:      true
    k8s:          true
    kubeApiserver: true
    kubePrometheusNodeAlerting: true
    node:         true
    prometheus:   true
