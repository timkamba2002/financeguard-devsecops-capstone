name: FinanceGuard DevSecOps Pipeline

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    branches: [ main, staging, development ]

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  866934333672.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER:   financeguard-eks-dev
  CHART_REPO:    oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

# ═══════════════════════════════════════════════════════════════════════════════
# PIPELINE OVERVIEW
#
#  Pre-flight  Gitleaks secret scan (blocks everything if secrets found)
#
#  Stage 1     BUILD          Python wheel + frontend asset artifacts
#  Stage 2     TEST           pytest · coverage · JUnit XML · Black lint
#  Stage 2b    SONARCLOUD     Code quality gate + security hotspots (needs coverage)
#  Stage 3     SECURITY SCAN  Bandit · Safety · Semgrep · Hadolint · Checkov · TFLint
#  Stage 4–5   BUILD → PUSH   Docker build (cache) → Trivy scan → SBOM → ECR push
#                              Image only reaches ECR if Trivy passes CRITICAL/HIGH gate
#                              ECR lifecycle policy applied (prune untagged > 14 days)
#  Stage 6     HELM PACKAGE   helm package → .tgz artifact → ECR OCI push
#
#  development branch:
#    Stage 7a  DEPLOY DEV     helm diff preview → helm upgrade --atomic (dev ns)
#    Stage 8a  INT TESTS      pytest tests/integration/ vs live dev ALB
#    Stage 8a  DAST           OWASP ZAP baseline scan (report only)
#    Stage 9a  PROMOTE        ECR retag :dev-verified · auto PR dev→staging
#
#  staging branch:
#    Stage 7b  DEPLOY STAGING helm diff → helm upgrade --atomic (staging ns)
#    Stage 8b  INT TESTS      pytest tests/integration/ vs live staging ALB
#    Stage 8b  DAST           OWASP ZAP full authenticated scan (fails on HIGH)
#    Stage 9b  PROMOTE        ECR retag :staging-verified · auto PR staging→main
#
#  main branch:
#    Stage 7c  DEPLOY PROD    ← MANUAL APPROVAL GATE (GitHub Environments)
#                              helm diff → helm upgrade --atomic (prod ns)
#    Stage 8c  SMOKE + RELEASE curl smoke test · retag :stable · GitHub Release
#    ON FAIL   NOTIFY         Slack alert on deploy-prod or release failure
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   SONAR_TOKEN          (SonarCloud — create project at sonarcloud.io first)
#   SLACK_WEBHOOK_URL    (Slack Incoming Webhook URL — optional, graceful skip if absent)
#   GITLEAKS_LICENSE     (optional, for Gitleaks Teams/Enterprise)
# ═══════════════════════════════════════════════════════════════════════════════

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # PRE-FLIGHT · Gitleaks Secret Scan
  # Detects API keys, tokens, credentials committed in code or git history.
  # Runs immediately — if this fails, nothing else proceeds.
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: "Pre-flight · Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so Gitleaks checks all commits

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1 · Build Artifacts
  # Compiles Python wheel (immutable build artifact) + snapshots frontend assets.
  # Uploaded to GitHub Actions Artifacts so downstream jobs don't re-install.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Stage 1 · Build Artifacts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build toolchain
        run: pip install build wheel

      - name: Build Python wheel
        run: |
          cd app/backend
          python -m build --wheel --outdir ../../dist/
          echo "── Wheel artifact ──"
          ls -lh ../../dist/

      - name: Upload backend wheel
        uses: actions/upload-artifact@v4
        with:
          name:           backend-wheel-${{ github.sha }}
          path:           dist/*.whl
          retention-days: 7

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name:           frontend-assets-${{ github.sha }}
          path:           app/frontend/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2 · Test & Coverage
  # pytest with JUnit XML + HTML/XML coverage.
  # Results published as a GitHub check (dorny/test-reporter).
  # Coverage XML passed to SonarCloud in Stage 2b.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Stage 2 · Test & Coverage"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-wheel-${{ github.sha }}
          path: dist/

      - name: Install wheel + test dependencies
        run: |
          pip install dist/*.whl
          pip install pytest pytest-cov black

      - name: Lint – Black
        run: black --check app/backend/

      - name: Unit tests with coverage
        run: |
          pytest app/backend/tests/ \
            --junitxml=test-results/junit.xml \
            --cov=app/backend \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/coverage-html/ \
            -v
        env:
          DATABASE_URL: "sqlite:///./test.db"

      - name: Publish test results (GitHub check)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:         Unit Test Results
          path:         test-results/junit.xml
          reporter:     java-junit
          fail-on-error: true

      - name: Upload test result artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           test-results-${{ github.sha }}
          path:           test-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2b · SonarCloud Code Quality + Security Gate
  # Needs coverage XML from Stage 2.
  # On PRs: posts inline annotations + blocks merge if quality gate fails.
  # Requires: SONAR_TOKEN secret + sonar-project.properties in repo root.
  # Sign up at sonarcloud.io, import the repo, copy the token.
  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: "Stage 2b · SonarCloud Quality Gate"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # shallow clones disable SonarCloud blame analysis

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: test-results/

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3 · Security & IaC Scan
  #
  # Bandit   – Python SAST (report on MEDIUM, fail on HIGH)
  # Safety   – Python dependency CVE audit
  # Semgrep  – OWASP Top-10 + secrets + security-audit ruleset
  # Hadolint – Dockerfile best-practice lint
  # Checkov  – Terraform IaC misconfiguration
  # TFLint   – Terraform provider-specific lint rules
  #
  # SARIF results are uploaded to GitHub Security → Code Scanning.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Stage 3 · Security & IaC Scan"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: |
          pip install -r app/backend/requirements.txt
          pip install bandit safety

      - name: SAST – Bandit (report MEDIUM, fail on HIGH)
        run: |
          bandit -r app/backend/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r app/backend/ --severity-level high

      - name: Dependency audit – Safety
        run: safety check --full-report

      - name: SAST – Semgrep (OWASP Top-10 + secrets + security-audit)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/security-audit
          generateSarif: "1"
        env:
          SEMGREP_TIMEOUT: 300

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category:   semgrep

      - name: Dockerfile lint – Hadolint (backend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: Dockerfile lint – Hadolint (frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/frontend/Dockerfile

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform init (for provider context)
        run: terraform init -backend=false
        working-directory: ./terraform

      - uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: |
          tflint --init
          tflint --format compact
        working-directory: ./terraform

      - name: IaC scan – Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory:        terraform/
          framework:        terraform
          soft_fail:        true
          output_format:    sarif
          output_file_path: checkov.sarif

      - name: Upload Checkov SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category:   checkov

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           security-reports-${{ github.sha }}
          path:           bandit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4–5 · Build → Scan → Push Images
  #
  # Single job so the image only reaches ECR if Trivy passes.
  # Build with GitHub Actions layer cache (speeds up repeat builds ~3×).
  # Trivy scans locally built image — exits 1 on CRITICAL/HIGH fixable CVEs.
  # Syft generates SPDX SBOM for supply-chain provenance.
  # After scan passes: push :sha (immutable) + :<branch>-latest (mutable).
  # ECR lifecycle policy applied: prune untagged images older than 14 days,
  # keep only last 20 verification tags.
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    name: "Stage 4–5 · Build, Scan & Push Images"
    runs-on: ubuntu-latest
    needs: [ test, security-scan, secret-scan ]
    if: github.event_name == 'push'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build backend (GHA layer cache, load only — no push yet)
        uses: docker/build-push-action@v5
        with:
          context:    ./app/backend
          load:       true
          push:       false
          tags:       financeguard-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Trivy scan – backend (FAIL on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      financeguard-backend:${{ github.sha }}
          format:         sarif
          output:         trivy-backend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: SBOM – backend (Syft/SPDX)
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-backend:${{ github.sha }}
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json
          output-file:   sbom-backend.spdx.json

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend (GHA layer cache, load only)
        uses: docker/build-push-action@v5
        with:
          context:    ./app/frontend
          load:       true
          push:       false
          tags:       financeguard-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Trivy scan – frontend (FAIL on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      financeguard-frontend:${{ github.sha }}
          format:         sarif
          output:         trivy-frontend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: SBOM – frontend (Syft/SPDX)
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-frontend:${{ github.sha }}
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json
          output-file:   sbom-frontend.spdx.json

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy

      # ── Push (only reaches here if both Trivy scans passed) ──────────────────
      - name: Push backend to ECR
        run: |
          B=${{ env.ECR_REGISTRY }}/financeguard-backend
          docker tag financeguard-backend:${{ github.sha }} $B:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }} $B:${{ github.ref_name }}-latest
          docker push $B:${{ github.sha }}
          docker push $B:${{ github.ref_name }}-latest
          echo "✅ Pushed $B:${{ github.sha }}"

      - name: Push frontend to ECR
        run: |
          F=${{ env.ECR_REGISTRY }}/financeguard-frontend
          docker tag financeguard-frontend:${{ github.sha }} $F:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} $F:${{ github.ref_name }}-latest
          docker push $F:${{ github.sha }}
          docker push $F:${{ github.ref_name }}-latest
          echo "✅ Pushed $F:${{ github.sha }}"

      # ── ECR lifecycle policies ────────────────────────────────────────────────
      - name: Apply ECR lifecycle policies
        run: |
          for repo in financeguard-backend financeguard-frontend; do
            aws ecr put-lifecycle-policy \
              --repository-name "$repo" \
              --lifecycle-policy-text '{
                "rules": [
                  {
                    "rulePriority": 1,
                    "description": "Expire untagged images after 14 days",
                    "selection": {
                      "tagStatus": "untagged",
                      "countType": "sinceImagePushed",
                      "countUnit": "days",
                      "countNumber": 14
                    },
                    "action": {"type": "expire"}
                  },
                  {
                    "rulePriority": 2,
                    "description": "Keep last 20 dev/staging-verified images",
                    "selection": {
                      "tagStatus": "tagged",
                      "tagPrefixList": ["dev-verified-", "staging-verified-"],
                      "countType": "imageCountMoreThan",
                      "countNumber": 20
                    },
                    "action": {"type": "expire"}
                  }
                ]
              }'
            echo "Lifecycle policy applied to $repo"
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 6 · Helm Package & Push to ECR OCI
  # ─────────────────────────────────────────────────────────────────────────────
  helm-package:
    name: "Stage 6 · Package & Push Helm Charts"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    outputs:
      chart-version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set chart version
        id: ver
        run: echo "version=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Package charts
        run: |
          helm package helm/backend  \
            --version     ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/charts/
          helm package helm/frontend \
            --version     ${{ steps.ver.outputs.version }} \
            --app-version ${{ github.sha }} \
            --destination dist/charts/

      - name: Upload chart archives as artifact
        uses: actions/upload-artifact@v4
        with:
          name:           helm-charts-${{ github.sha }}
          path:           dist/charts/*.tgz
          retention-days: 30

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Ensure ECR chart repositories exist
        run: |
          for repo in charts/backend charts/frontend; do
            aws ecr describe-repositories --repository-names "$repo" 2>/dev/null || \
              aws ecr create-repository --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true
          done

      - name: Push charts to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          helm push dist/charts/backend-${{ steps.ver.outputs.version }}.tgz  ${{ env.CHART_REPO }}
          helm push dist/charts/frontend-${{ steps.ver.outputs.version }}.tgz ${{ env.CHART_REPO }}
          echo "Charts pushed to ${{ env.CHART_REPO }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7a · Deploy to Dev  (development branch only)
  # helm diff shows exactly what will change before applying.
  # --atomic auto-rolls back if deploy times out or pods crash-loop.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "Stage 7 · Deploy to Dev"
    runs-on: ubuntu-latest
    needs: [ build-push, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Install helm-diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: Diff – backend (preview changes before applying)
        run: |
          helm diff upgrade financeguard-backend-dev \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            -f helm/backend/values.yaml \
            -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy backend → dev (--atomic)
        run: |
          helm upgrade --install financeguard-backend-dev \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: Diff – frontend
        run: |
          helm diff upgrade financeguard-frontend-dev \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy frontend → dev (--atomic)
        run: |
          helm upgrade --install financeguard-frontend-dev \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8a · Integration Tests (dev)
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test-dev:
    name: "Stage 8 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get dev ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT
          echo "Dev ALB: http://$HOST"

      - run: pip install requests pytest pytest-html

      - name: Run integration tests
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (dev)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-dev-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8a-DAST · OWASP ZAP Baseline Scan (dev)
  # Passive spider + scan. Reports findings but does NOT fail the pipeline —
  # dev is noisy and may have known issues. Full fail-on-HIGH happens in staging.
  # ─────────────────────────────────────────────────────────────────────────────
  zap-dev:
    name: "Stage 8 · DAST – ZAP Baseline (dev)"
    runs-on: ubuntu-latest
    needs: integration-test-dev
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get dev ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false           # report only in dev, don't block
          artifact_name: zap-baseline-dev-${{ github.sha }}
          cmd_options:   "-a"            # include alpha passive rules

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 9a · Image Promotion + Auto PR  (dev → staging)
  # ─────────────────────────────────────────────────────────────────────────────
  promote-dev:
    name: "Stage 9 · Promote Image + Open PR (dev→staging)"
    runs-on: ubuntu-latest
    needs: [ integration-test-dev, zap-dev ]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Retag backend → :dev-verified (ECR manifest copy, no layer transfer)
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag dev-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Retag frontend → :dev-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag dev-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Open promotion PR (development → staging)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --base staging --head development --state open \
            --json number --jq '.[0].number')
          [ -n "$existing" ] && { echo "PR #$existing already open"; exit 0; }

          gh pr create \
            --base staging \
            --head development \
            --title "promote(dev→staging): ${{ github.sha }}" \
            --body "## Automated promotion: dev → staging

          All dev pipeline stages passed for \`${{ github.sha }}\`.

          | Stage | Status |
          |---|---|
          | Gitleaks secret scan | ✅ |
          | Unit tests | ✅ |
          | SonarCloud quality gate | ✅ |
          | Bandit SAST | ✅ |
          | Safety dependency audit | ✅ |
          | Semgrep OWASP scan | ✅ |
          | Trivy container scan | ✅ |
          | SBOM generated | ✅ |
          | Dev deploy (helm upgrade) | ✅ |
          | Integration tests (dev) | ✅ |
          | OWASP ZAP baseline | ✅ |

          **Promoted images:**
          - \`financeguard-backend:dev-verified-${{ github.sha }}\`
          - \`financeguard-frontend:dev-verified-${{ github.sha }}\`

          **Before merging:** verify dev environment, then merge to trigger staging pipeline."

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7b · Deploy to Staging  (staging branch only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: "Stage 7 · Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [ build-push, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Install helm-diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: Diff – backend
        run: |
          helm diff upgrade financeguard-backend-staging \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            -f helm/backend/values.yaml \
            -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy backend → staging (--atomic)
        run: |
          helm upgrade --install financeguard-backend-staging \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: Diff – frontend
        run: |
          helm diff upgrade financeguard-frontend-staging \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy frontend → staging (--atomic)
        run: |
          helm upgrade --install financeguard-frontend-staging \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8b · Integration Tests (staging)
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test-staging:
    name: "Stage 8 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get staging ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "url=http://$HOST" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html

      - name: Run integration tests
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (staging)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-results-staging-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8b-DAST · OWASP ZAP Full Authenticated Scan (staging)
  # Active scan — tests for injection, XSS, broken auth, etc.
  # fail_action: true — HIGH findings block promotion to prod.
  # ─────────────────────────────────────────────────────────────────────────────
  zap-staging:
    name: "Stage 8 · DAST – ZAP Full Scan (staging)"
    runs-on: ubuntu-latest
    needs: integration-test-staging
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Get staging ALB hostname
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      - name: OWASP ZAP full scan (FAIL on HIGH findings)
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   true            # HIGH findings block promotion to prod
          artifact_name: zap-full-staging-${{ github.sha }}
          cmd_options:   "-a -j"         # alpha rules + ajax spider

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 9b · Image Promotion + Auto PR  (staging → main)
  # ─────────────────────────────────────────────────────────────────────────────
  promote-staging:
    name: "Stage 9 · Promote Image + Open PR (staging→main)"
    runs-on: ubuntu-latest
    needs: [ integration-test-staging, zap-staging ]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Retag backend → :staging-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag staging-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Retag frontend → :staging-verified
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag staging-verified-${{ github.sha }} \
            --image-manifest "$MANIFEST"

      - name: Open promotion PR (staging → main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --base main --head staging --state open \
            --json number --jq '.[0].number')
          [ -n "$existing" ] && { echo "PR #$existing already open"; exit 0; }

          gh pr create \
            --base main \
            --head staging \
            --title "promote(staging→prod): ${{ github.sha }}" \
            --body "## Automated promotion: staging → production

          All staging pipeline stages passed for \`${{ github.sha }}\`.

          | Stage | Status |
          |---|---|
          | Gitleaks secret scan | ✅ |
          | Unit tests | ✅ |
          | SonarCloud quality gate | ✅ |
          | Bandit / Semgrep SAST | ✅ |
          | Trivy container scan | ✅ |
          | SBOM generated | ✅ |
          | Staging deploy (helm upgrade) | ✅ |
          | Integration tests (staging) | ✅ |
          | OWASP ZAP full scan | ✅ |

          **Images ready for production:**
          - \`financeguard-backend:staging-verified-${{ github.sha }}\`
          - \`financeguard-frontend:staging-verified-${{ github.sha }}\`

          **Before merging:**
          - [ ] Staging validated by stakeholder
          - [ ] Rollback plan confirmed
          - [ ] Change window approved

          > Merging triggers \`deploy-prod\`, which **pauses for your approval**
          > in GitHub Environments before touching production."

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 7c · Deploy to Production  (main branch only)
  # Pipeline pauses at the GitHub Environments gate — you click Approve.
  # --atomic: if rollout fails, Helm auto-rolls back to previous release.
  # Deploys the same :sha that passed ALL staging gates — zero rebuild.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "Stage 7 · Deploy to Production"
    runs-on: ubuntu-latest
    needs: [ build-push, helm-package ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production     # ← pipeline pauses here for manual approval
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm login to ECR OCI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Install helm-diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: Diff – backend (REQUIRED review before applying)
        run: |
          helm diff upgrade financeguard-backend-prod \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            -f helm/backend/values.yaml \
            -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy backend → production (--atomic, 10m timeout)
        run: |
          helm upgrade --install financeguard-backend-prod \
            ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/backend/values.yaml \
            -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-backend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      - name: Diff – frontend
        run: |
          helm diff upgrade financeguard-frontend-prod \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased || true

      - name: Deploy frontend → production (--atomic)
        run: |
          helm upgrade --install financeguard-frontend-prod \
            ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/frontend/values.yaml \
            -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_REGISTRY }}/financeguard-frontend \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 8c · Smoke Test + Retag :stable + GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: "Stage 8 · Smoke Test & Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Production smoke test
        run: |
          HOST=$(kubectl get ingress -n prod \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "Production: http://$HOST"

          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/health" || echo "000")
            [ "$STATUS" = "200" ] && { echo "✅ /health → 200"; break; }
            echo "⏳ Attempt $i → $STATUS, retrying in 10s..."
            sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "❌ Health check failed"; exit 1; }

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/api/v1/transactions" || echo "000")
          [ "$STATUS" = "200" ] || { echo "❌ API smoke test failed (got $STATUS)"; exit 1; }
          echo "✅ All smoke tests passed"

      - name: Retag backend → :stable
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-backend \
            --image-tag stable --image-manifest "$MANIFEST"

      - name: Retag frontend → :stable
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --region ${{ env.AWS_REGION }} \
            --repository-name financeguard-frontend \
            --image-tag stable --image-manifest "$MANIFEST"

      - name: Download helm chart artifacts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts-${{ github.sha }}
          path: dist/charts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "## FinanceGuard v0.1.${{ github.run_number }}

          **Commit:** \`${{ github.sha }}\`

          ### Pipeline gates passed
          | Gate | Tool |
          |---|---|
          | Secret scanning | Gitleaks |
          | SAST | Bandit · Semgrep |
          | Dependency audit | Safety |
          | Code quality | SonarCloud |
          | Container scanning | Trivy (CRITICAL/HIGH) |
          | Supply-chain | Syft SBOM (SPDX) |
          | IaC scanning | Checkov · TFLint |
          | DAST | OWASP ZAP (baseline+full) |
          | Integration tests | dev + staging |
          | Prod smoke test | ✅ |

          ### Images
          | Image | Tags |
          |---|---|
          | \`financeguard-backend\` | \`${{ github.sha }}\` · \`stable\` |
          | \`financeguard-frontend\` | \`${{ github.sha }}\` · \`stable\` |
          " \
            dist/charts/*.tgz

  # ─────────────────────────────────────────────────────────────────────────────
  # NOTIFY · Slack alert on production deployment failure
  # Triggers if deploy-prod OR release fails.
  # SLACK_WEBHOOK_URL secret is optional — step is non-fatal if not configured.
  # ─────────────────────────────────────────────────────────────────────────────
  notify-prod-failure:
    name: "Notify · Production Failure Alert"
    runs-on: ubuntu-latest
    needs: [ deploy-prod, release ]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.deploy-prod.result == 'failure' || needs.release.result == 'failure')
    steps:
      - name: Slack alert on production failure
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *FinanceGuard production deployment FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Commit",   "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor",    "value": "${{ github.actor }}", "short": true},
                  {"title": "Job",      "value": "deploy-prod=${{ needs.deploy-prod.result }}  release=${{ needs.release.result }}", "short": false},
                  {"title": "Run URL",  "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true   # don't fail the job if Slack isn't configured
