replicaCount: 3

image:
  tag: "latest"
  pullPolicy: Always

env:
  VITE_API_BASE_URL: "https://api.financeguard.io"

resources:
  limits:
    cpu: 400m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
