# Loki stack Helm values (loki-stack chart = Loki + Promtail)
#
# Install: helm upgrade --install loki grafana/loki-stack \
#            --namespace monitoring -f this-file.yaml --version 2.10.2

loki:
  enabled: true
  isDistributed: false

  persistence:
    enabled: false   # EKS Fargate: EBS PVCs can't bind — use emptyDir (data lost on restart)

  config:
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory:  /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: 744h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32

    compactor:
      retention_enabled: true
      retention_delete_delay: 2h

  resources:
    requests:
      cpu:    100m
      memory: 256Mi
    limits:
      cpu:    500m
      memory: 512Mi

# Promtail is a DaemonSet — EKS Fargate does not support DaemonSets.
# Disabled here. Logs reach Loki via the OTel Collector instead (OTLP → Loki exporter).
promtail:
  enabled: false

# Grafana deployed via prometheus-stack chart
grafana:
  enabled: false
