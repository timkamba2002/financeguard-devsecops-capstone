apiVersion: v1
kind: ConfigMap
metadata:
  name: financeguard-grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  financeguard-datasources.yaml: |
    apiVersion: 1

    # Remove the auto-generated Loki datasource that loki-stack created
    # (UID was P8E80F9AEF21F6940 — no explicit UID was set, so Grafana generated one)
    deleteDatasources:
      - name: Loki
        orgId: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-stack-kube-prom-prometheus.monitoring:9090/
        access: proxy
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 30s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          tracesToLogs:
            datasourceUid: loki
            tags: [pod, namespace]

      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        url: http://prometheus-stack-kube-prom-alertmanager.monitoring:9093/
        access: proxy
        jsonData:
          handleGrafanaManagedAlerts: false
          implementation: prometheus
