apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

configMapGenerator:
  - name: backend-config
    literals:
      - ENVIRONMENT=production
      - SKIP_AUTH_VERIFICATION=false

patches:
  - target:
      kind: Deployment
      name: .*backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: .*frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
