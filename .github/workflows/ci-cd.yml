name: FinanceGuard CI/CD — GitOps (Trunk-Based)

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  FINANCEGUARD DEVSECOPS — TRUNK-BASED GITOPS PIPELINE                    ║
# ║                                                                           ║
# ║  Single source of truth: git manifests in gitops/                        ║
# ║  Argo CD is the ONLY deployer — pipeline never runs helm upgrade.        ║
# ║                                                                           ║
# ║  Flow:                                                                    ║
# ║   1. Build & scan images                                                  ║
# ║   2. Update gitops/dev/ → Argo CD auto-deploys dev                       ║
# ║   3. Integration tests + ZAP on dev                                      ║
# ║   4. [APPROVAL: staging] → Update gitops/staging/ → Argo CD deploys      ║
# ║   5. Integration tests + ZAP on staging                                  ║
# ║   6. [APPROVAL: production] → Update gitops/prod/ → Argo CD deploys      ║
# ║   7. Evidence bundle + GitHub Release                                     ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 866934333672.dkr.ecr.us-east-1.amazonaws.com
  ECR_BACKEND:  866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
  ECR_FRONTEND: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  EKS_CLUSTER:  financeguard-eks-dev
  CHART_REPO:   oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

jobs:

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                        STAGE 0 · PR VALIDATION                        ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  pr-validation:
    name: "🔍 Stage 0 · PR Validation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Gitleaks — Secret Scan"
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: "🛡️ Semgrep — SAST (OWASP Top-10)"
        run: |
          pip install semgrep -q
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            app/backend/ || true
        continue-on-error: true   # DEMO ONLY — remove for production

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category:   semgrep-pr

      - name: "🏗️ Checkov — IaC Scan"
        run: |
          pip install checkov -q
          checkov -d terraform/ --framework terraform --soft-fail --quiet || true
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "🧪 Unit Tests + Black"
        run: |
          pip install -r app/backend/requirements.txt pytest pytest-cov black -q
          black --check app/backend/
          pytest app/backend/tests/ \
            --junitxml=test-results/junit.xml \
            --cov=app/backend \
            --cov-report=xml:test-results/coverage.xml \
            -q
        env:
          DATABASE_URL: sqlite:///./test.db

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          Unit Test Results
          path:          test-results/junit.xml
          reporter:      java-junit
          fail-on-error: true

      - name: "📊 SonarCloud — Quality Gate"
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

      - name: "📋 PR Validation Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔍 PR Validation — FinanceGuard

          | Check | Tool | Gate |
          |---|---|---|
          | Secret scan | Gitleaks (full history) | ⚠️ demo: warn |
          | SAST — OWASP Top-10 | Semgrep | ⚠️ demo: warn |
          | IaC misconfigs | Checkov | ⚠️ demo: warn |
          | Unit tests + Black | pytest + Black | ✅ hard fail |
          | Code quality gate | SonarCloud | ⚠️ demo: warn |
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                 STAGE 1 · BUILD, SCAN, SIGN & PUSH                    ║
  # ║  Produces immutable images tagged :sha. Same digest flows unchanged    ║
  # ║  through dev → staging → prod. Nothing is rebuilt per environment.    ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  build-sign-push:
    name: "🏗️ Stage 1 · Build, Scan, Sign & Push"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token:        write    # OIDC for keyless cosign signing
      contents:        read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # ── Backend ───────────────────────────────────────────────────────────
      - name: "🔨 Build backend"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/backend
          load:       true
          push:       false
          tags:       financeguard-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: "🔍 Trivy — Backend (CRITICAL/HIGH)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-backend:${{ github.sha }}
          format:         sarif
          output:         trivy-backend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "📄 Syft SBOM — Backend"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-backend:${{ github.sha }}
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json
          output-file:   sbom-backend.spdx.json

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: "🔨 Build frontend"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/frontend
          load:       true
          push:       false
          tags:       financeguard-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: "🔍 Trivy — Frontend (CRITICAL/HIGH)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-frontend:${{ github.sha }}
          format:         sarif
          output:         trivy-frontend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "📄 Syft SBOM — Frontend"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-frontend:${{ github.sha }}
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json
          output-file:   sbom-frontend.spdx.json

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy

      # ── Push to ECR ───────────────────────────────────────────────────────
      - name: "📤 Push images to ECR"
        run: |
          docker tag financeguard-backend:${{ github.sha }}  ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }}  ${{ env.ECR_BACKEND }}:latest
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ env.ECR_BACKEND }}:latest

          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:latest
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.ECR_FRONTEND }}:latest

      # ── Cosign keyless signing ─────────────────────────────────────────────
      - uses: sigstore/cosign-installer@v3

      - name: "🔏 Cosign sign images (OIDC keyless)"
        run: |
          cosign sign --yes ${{ env.ECR_BACKEND }}:${{ github.sha }}
          cosign sign --yes ${{ env.ECR_FRONTEND }}:${{ github.sha }}
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── ECR lifecycle + Helm chart package (artifact only — not used by ArgoCD) ─
      - name: "♻️ ECR lifecycle policies"
        run: |
          for repo in financeguard-backend financeguard-frontend; do
            aws ecr put-lifecycle-policy \
              --repository-name "$repo" \
              --lifecycle-policy-text '{
                "rules": [{
                  "rulePriority": 1,
                  "description": "Expire untagged images after 14 days",
                  "selection": {"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":14},
                  "action": {"type":"expire"}
                }]
              }'
          done

      - name: "📦 Package Helm charts (supply-chain artifact)"
        run: |
          aws ecr create-repository --repository-name charts/backend  --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ecr create-repository --repository-name charts/frontend --region ${{ env.AWS_REGION }} 2>/dev/null || true

          helm package helm/backend  --version 0.1.${{ github.run_number }} \
            --app-version ${{ github.sha }} --destination dist/
          helm package helm/frontend --version 0.1.${{ github.run_number }} \
            --app-version ${{ github.sha }} --destination dist/
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          helm push dist/backend-0.1.${{ github.run_number }}.tgz  ${{ env.CHART_REPO }}
          helm push dist/frontend-0.1.${{ github.run_number }}.tgz ${{ env.CHART_REPO }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           build-artifacts-${{ github.sha }}
          path: |
            *.sarif
            *.spdx.json
            dist/*.tgz
          retention-days: 30

      - name: "📋 Build Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🏗️ Build, Scan, Sign & Push

          | Step | Detail | Status |
          |---|---|---|
          | Docker build | backend + frontend (GHA layer cache) | ✅ |
          | Trivy | CRITICAL/HIGH fixable CVEs | ⚠️ demo |
          | Syft SBOM | SPDX 2.3 | ✅ artifact |
          | ECR push | \`:${{ github.sha }}\` + \`:latest\` | ✅ |
          | Cosign sign | OIDC keyless (Sigstore) | ⚠️ demo |
          | Helm charts | v0.1.${{ github.run_number }} → ECR OCI (artifact only) | ✅ |

          **Images:** \`${{ env.ECR_BACKEND }}:${{ github.sha }}\`
          > Same image digest flows unchanged: dev → staging → prod.
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║              STAGE 1.5 · GITOPS — PROMOTE IMAGE TO DEV                ║
  # ║                                                                        ║
  # ║  Writes the new SHA into gitops/dev/ only and pushes [skip ci].       ║
  # ║  Argo CD detects the git change and runs `helm upgrade` — the         ║
  # ║  pipeline does NOT run helm directly.                                  ║
  # ║                                                                        ║
  # ║  staging and prod manifests are updated ONLY after their approval      ║
  # ║  gates fire (see deploy-staging and deploy-prod jobs below).           ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  gitops-promote-dev:
    name: "🔄 Stage 1.5 · GitOps — Promote to dev"
    runs-on: ubuntu-latest
    needs: build-sign-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "Install yq"
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: "Update image.tag in gitops/dev/"
        run: |
          SHA="${{ github.sha }}"
          for service in backend frontend; do
            FILE="gitops/dev/$service.yaml"
            yq e "(.spec.source.helm.parameters[] | select(.name == \"image.tag\")).value = \"$SHA\"" \
              -i "$FILE"
            echo "✅ Updated $FILE → $SHA"
          done

      - name: "Commit and push [skip ci]"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/dev/
          git diff --staged --quiet && echo "No dev changes to commit" && exit 0
          git commit -m "chore(gitops): promote ${{ github.sha }} → dev [skip ci]

          Pipeline run #${{ github.run_number }}.
          Argo CD will detect this commit and sync the dev namespace."
          git push origin main

      - name: "📋 GitOps Promote Summary"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🔄 GitOps Promotion → dev

          | Environment | Service | New tag |
          |---|---|---|
          | dev | backend | \`${{ github.sha }}\` |
          | dev | frontend | \`${{ github.sha }}\` |

          - **dev** → Argo CD auto-syncs (automated sync enabled)
          - **staging** → will update after staging approval gate
          - **prod** → will update after production approval gate
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                      STAGE 2 · WAIT FOR DEV                           ║
  # ║  Polls until Argo CD has applied the new image to the dev namespace.  ║
  # ║  No helm upgrade — Argo CD is the sole deployer.                      ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-dev:
    name: "🚀 Stage 2 · Wait for dev rollout"
    runs-on: ubuntu-latest
    needs: [ build-sign-push, gitops-promote-dev ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # ── Verify image signature before declaring deploy healthy ─────────────
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify backend image"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-dev.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── Bootstrap: ensure the app-of-apps and all Application manifests    ──
      # ── are applied. Idempotent — safe to run on every build.              ──
      - name: "🔧 Bootstrap Argo CD app-of-apps + dev apps"
        run: |
          # Apply the app-of-apps (manages all Application resources in gitops/)
          kubectl apply -f gitops/app-of-apps.yaml

          # Ensure dev Applications exist (app-of-apps will maintain them going forward)
          kubectl apply -f gitops/dev/backend.yaml
          kubectl apply -f gitops/dev/frontend.yaml

          echo "✅ Bootstrap complete."

      # ── One-time cleanup of orphaned releases created by the old pipeline ──
      # ── (helm upgrade --install ran before this GitOps migration).         ──
      # ── Remove this block once the orphaned releases are gone.             ──
      - name: "🧹 Clean up orphaned helm releases (one-time)"
        run: |
          # Install helm only for this cleanup step
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash -s -- --version v3.14.0 2>/dev/null
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }} 2>/dev/null || true

          for release in financeguard-backend-dev financeguard-frontend-dev; do
            if helm status "$release" -n dev &>/dev/null 2>&1; then
              echo "Removing orphaned release $release..."
              helm uninstall "$release" -n dev || true
            else
              echo "Release $release not found (already clean)."
            fi
          done
        continue-on-error: true   # cleanup failure must never block the deploy

      # ── Wait for Argo CD to apply the new image tag ───────────────────────
      - name: "⏳ Wait for Argo CD to deploy SHA to dev"
        run: |
          SHA="${{ github.sha }}"
          NS="dev"
          echo "Waiting for Argo CD to update dev deployments to SHA: $SHA"
          echo "(Argo CD polls git every ~3 min; this step waits up to 10 min)"

          for deploy in financeguard-backend-backend financeguard-frontend-frontend; do
            echo "--- Watching deployment: $deploy ---"
            for i in $(seq 1 40); do
              IMG=$(kubectl get deployment "$deploy" -n "$NS" \
                -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "not-found")
              if echo "$IMG" | grep -q "$SHA"; then
                echo "✅ New image detected (attempt $i). Running rollout status..."
                kubectl rollout status "deployment/$deploy" -n "$NS" --timeout=5m
                echo "✅ $deploy rollout complete."
                break
              fi
              if [ "$i" -eq 40 ]; then
                echo "❌ Timed out after 10 min waiting for $deploy to use SHA $SHA"
                echo "   Current image: $IMG"
                echo "   Check Argo CD UI: kubectl port-forward svc/argocd-server -n argocd 8080:443"
                exit 1
              fi
              echo "  attempt $i/40 — image not yet updated: $IMG — sleeping 15s..."
              sleep 15
            done
          done

          echo "✅ All dev deployments are running SHA $SHA."

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-dev-artifacts-${{ github.sha }}
          path:           cosign-verify-dev.txt
          retention-days: 30

      - name: "📋 Dev Deploy Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Dev Deployment

          **Namespace:** \`dev\`  |  **Image:** \`${{ github.sha }}\`

          | Step | Mode |
          |---|---|
          | Deploy | Argo CD (GitOps) — no direct helm upgrade |
          | Approval | Automatic — no human gate for dev |
          | Sync | Argo CD auto-syncs when gitops/dev/ changes |
          EOF

  integration-test-dev:
    name: "🧪 Stage 2 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    continue-on-error: true   # DEMO ONLY — remove once LB controller confirmed
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          for i in $(seq 1 18); do
            HOST=$(kubectl get ingress -n dev \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOST" ] && [ "$HOST" != "null" ]; then
              echo "✅ ALB: $HOST"
              echo "url=http://$HOST" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "⏳ attempt $i/18 — pending..."
            sleep 10
          done
          echo "url=http://pending" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html -q

      - name: "Run integration tests"
        continue-on-error: true
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name:          Integration Tests (dev)
          path:          integration-results/junit.xml
          reporter:      java-junit
          fail-on-error: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-dev-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  zap-dev:
    name: "🛡️ Stage 2 · DAST Baseline (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      - name: "🕷️ ZAP Baseline Scan (passive)"
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false
          artifact_name: zap-baseline-dev-${{ github.run_number }}

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                    STAGE 3 · DEPLOY TO STAGING                        ║
  # ║                                                                        ║
  # ║  GitHub pauses here for a human approval in the "staging"             ║
  # ║  Environment. Once approved, the job:                                 ║
  # ║    1. Updates gitops/staging/ with the new SHA (git commit + push)    ║
  # ║    2. Bootstraps Argo CD staging Applications if not yet applied      ║
  # ║    3. Waits for Argo CD to roll out the new image                     ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-staging:
    name: "🚀 Stage 3 · Deploy → Staging (✋ approval)"
    runs-on: ubuntu-latest
    needs: [ integration-test-dev, zap-dev ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging    # ← PAUSES HERE — click Approve in GitHub Environments UI
    permissions:
      contents: write       # needed to push gitops manifest update
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify images"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-staging.txt
        continue-on-error: true

      # ── Step 1: update gitops/staging/ manifest ───────────────────────────
      - name: "Install yq"
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: "📝 Promote image to staging manifests"
        run: |
          SHA="${{ github.sha }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest — gitops-promote-dev may have pushed commits ahead of us
          git pull --rebase origin main

          for service in backend frontend; do
            FILE="gitops/staging/$service.yaml"
            yq e "(.spec.source.helm.parameters[] | select(.name == \"image.tag\")).value = \"$SHA\"" \
              -i "$FILE"
            echo "✅ Updated $FILE → $SHA"
          done

          git add gitops/staging/
          git diff --staged --quiet && echo "No staging changes to commit" && exit 0
          git commit -m "chore(gitops): promote $SHA → staging [skip ci]

          Approved by ${{ github.actor }} via GitHub Environments (staging gate).
          Pipeline run #${{ github.run_number }}."
          git push origin main

      # ── Step 2: bootstrap staging Argo CD Applications ────────────────────
      - name: "🔧 Bootstrap staging Argo CD Applications"
        run: |
          kubectl apply -f gitops/staging/backend.yaml
          kubectl apply -f gitops/staging/frontend.yaml
          echo "✅ Staging Applications applied. Argo CD will sync now."

      # ── Step 3: wait for Argo CD to roll out ─────────────────────────────
      - name: "⏳ Wait for Argo CD to deploy SHA to staging"
        run: |
          SHA="${{ github.sha }}"
          NS="staging"
          for deploy in financeguard-backend-backend financeguard-frontend-frontend; do
            echo "--- Watching $deploy in $NS ---"
            for i in $(seq 1 40); do
              IMG=$(kubectl get deployment "$deploy" -n "$NS" \
                -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "not-found")
              if echo "$IMG" | grep -q "$SHA"; then
                kubectl rollout status "deployment/$deploy" -n "$NS" --timeout=5m
                echo "✅ $deploy rollout complete."
                break
              fi
              [ "$i" -eq 40 ] && echo "❌ Timeout waiting for $deploy" && exit 1
              echo "  attempt $i/40 — not yet updated: $IMG"
              sleep 15
            done
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-staging-artifacts-${{ github.sha }}
          path:           cosign-verify-staging.txt
          retention-days: 30

      - name: "📋 Staging Deploy Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Staging Deployment

          **Namespace:** \`staging\`  |  **Image:** \`${{ github.sha }}\`

          | Step | Mode |
          |---|---|
          | Approval | ✅ Approved in GitHub Environments |
          | Deploy | Argo CD (GitOps) — auto-sync on manifest change |
          | Cosign verify | ⚠️ demo |
          EOF

  integration-test-staging:
    name: "🧪 Stage 3 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          for i in $(seq 1 18); do
            HOST=$(kubectl get ingress -n staging \
              -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOST" ] && [ "$HOST" != "null" ]; then
              echo "url=http://$HOST" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 10
          done
          echo "url=http://pending" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html -q

      - name: "Run integration tests"
        continue-on-error: true
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name:          Integration Tests (staging)
          path:          integration-results/junit.xml
          reporter:      java-junit
          fail-on-error: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-staging-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  zap-staging:
    name: "🛡️ Stage 3 · DAST Full Scan (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      - name: "🕷️ ZAP Full Scan (active)"
        uses: zaproxy/action-full-scan@v0.10.0
        continue-on-error: true   # DEMO ONLY — set fail_action: true for production
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false
          artifact_name: zap-full-staging-${{ github.run_number }}

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                   STAGE 4 · DEPLOY TO PRODUCTION                      ║
  # ║                                                                        ║
  # ║  GitHub pauses for human approval in the "production" Environment.    ║
  # ║  Prod Argo CD apps have automated: {selfHeal: false} — they NEVER     ║
  # ║  auto-sync. This job is the only path to production deployment.        ║
  # ║  GitHub records the approver and timestamp — this IS the audit trail. ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-prod:
    name: "🚀 Stage 4 · Deploy → Production (✋ approval)"
    runs-on: ubuntu-latest
    needs: [ integration-test-staging, zap-staging ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # ← PAUSES HERE — click Approve in GitHub Environments UI
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify images (pre-production)"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-prod.txt
        continue-on-error: true

      # ── Step 1: update gitops/prod/ manifest ─────────────────────────────
      - name: "Install yq"
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: "📝 Promote image to production manifests"
        run: |
          SHA="${{ github.sha }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest — staging promote may have pushed commits ahead of us
          git pull --rebase origin main

          for service in backend frontend; do
            FILE="gitops/prod/$service.yaml"
            yq e "(.spec.source.helm.parameters[] | select(.name == \"image.tag\")).value = \"$SHA\"" \
              -i "$FILE"
            echo "✅ Updated $FILE → $SHA"
          done

          git add gitops/prod/
          git diff --staged --quiet && echo "No prod changes to commit" && exit 0
          git commit -m "chore(gitops): promote $SHA → production [skip ci]

          Approved by ${{ github.actor }} via GitHub Environments (production gate).
          Pipeline run #${{ github.run_number }}."
          git push origin main

      # ── Step 2: bootstrap prod Argo CD Applications ───────────────────────
      # ── Prod apps have selfHeal: false so they will NOT sync on their own. ──
      # ── We explicitly trigger a sync via kubectl after applying.           ──
      - name: "🔧 Bootstrap prod Argo CD Applications + trigger sync"
        run: |
          kubectl apply -f gitops/prod/backend.yaml
          kubectl apply -f gitops/prod/frontend.yaml

          # Install Argo CD CLI to explicitly trigger sync (prod won't auto-sync)
          VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          sudo curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64"
          sudo chmod +x /usr/local/bin/argocd

          # Log in to Argo CD (port-forward to local 8080)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &>/dev/null &
          sleep 5
          ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret -n argocd \
            -o jsonpath='{.data.password}' | base64 -d)
          argocd login localhost:8080 --username admin --password "$ARGOCD_PASS" \
            --insecure --grpc-web 2>&1

          # Explicitly sync prod apps (required because selfHeal: false)
          argocd app sync financeguard-backend-prod  --prune=false --async 2>&1 || true
          argocd app sync financeguard-frontend-prod --prune=false --async 2>&1 || true

          echo "✅ Prod sync triggered."

      # ── Step 3: wait for rollout ──────────────────────────────────────────
      - name: "⏳ Wait for prod rollout"
        run: |
          SHA="${{ github.sha }}"
          NS="prod"
          for deploy in financeguard-backend-backend financeguard-frontend-frontend; do
            echo "--- Watching $deploy in $NS ---"
            for i in $(seq 1 40); do
              IMG=$(kubectl get deployment "$deploy" -n "$NS" \
                -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "not-found")
              if echo "$IMG" | grep -q "$SHA"; then
                kubectl rollout status "deployment/$deploy" -n "$NS" --timeout=10m
                echo "✅ $deploy rollout complete."
                break
              fi
              [ "$i" -eq 40 ] && echo "❌ Timeout waiting for $deploy" && exit 1
              echo "  attempt $i/40 — not yet updated: $IMG"
              sleep 15
            done
          done

      - name: "✅ Production smoke test"
        run: |
          HOST=$(kubectl get ingress -n prod \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "Production: http://$HOST"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/health" || echo "000")
            [ "$STATUS" = "200" ] && { echo "✅ /health → 200 (attempt $i)"; break; }
            echo "⏳ attempt $i/12 → HTTP $STATUS"; sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "❌ Smoke test timed out"; exit 1; }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-prod-artifacts-${{ github.sha }}
          path:           cosign-verify-prod.txt
          retention-days: 90

      - name: "📋 Production Deploy Summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Production Deployment

          **Namespace:** \`prod\`  |  **Image:** \`${{ github.sha }}\`  |  **Run:** #${{ github.run_number }}

          | Step | Mode |
          |---|---|
          | Approval | ✅ Approved by ${{ github.actor }} — GitHub records approver + timestamp |
          | Deploy | Argo CD (GitOps) — explicit sync (selfHeal: false in prod) |
          | Cosign verify | ⚠️ demo |
          | Smoke test | /health → 200 ✅ |

          **Security gates:** Gitleaks · Semgrep · Checkov · pytest ·
          Trivy · Syft SBOM · Cosign · ZAP baseline (dev) · ZAP full (staging)
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║              STAGE 5 · EVIDENCE BUNDLE + GITHUB RELEASE               ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  evidence-release:
    name: "📦 Stage 5 · Evidence Bundle + Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Download all pipeline artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: "Assemble evidence bundle"
        run: |
          mkdir -p evidence/{security,tests,sbom,signatures,deployment}

          cp -r artifacts/build-artifacts-*/         evidence/security/   2>/dev/null || true
          cp -r artifacts/integration-dev-*/         evidence/tests/      2>/dev/null || true
          cp -r artifacts/integration-staging-*/     evidence/tests/      2>/dev/null || true
          cp -r artifacts/deploy-dev-artifacts-*/    evidence/deployment/  2>/dev/null || true
          cp -r artifacts/deploy-staging-artifacts-*/ evidence/deployment/ 2>/dev/null || true
          cp -r artifacts/deploy-prod-artifacts-*/   evidence/deployment/  2>/dev/null || true
          find artifacts/ -name "*.spdx.json" -exec cp {} evidence/sbom/ \; 2>/dev/null || true

          kubectl get applications -n argocd -o wide > evidence/deployment/argocd-apps.txt 2>/dev/null || true

          cat > evidence/manifest.json << EOF
          {
            "project":  "FinanceGuard DevSecOps Capstone",
            "model":    "Trunk-Based GitOps (Argo CD)",
            "version":  "v0.1.${{ github.run_number }}",
            "commit":   "${{ github.sha }}",
            "actor":    "${{ github.actor }}",
            "pipeline": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "tools":    ["Gitleaks","Semgrep","Checkov","SonarCloud","Trivy","Syft","Cosign","ZAP","ArgoCD","Kyverno","Falco","ESO"],
            "gitops":   "Argo CD is the sole deployer — pipeline writes image tags to git only"
          }
          EOF

          find evidence/ -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name:           "EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}-${{ github.sha }}"
          path:           evidence/
          retention-days: 90

      - name: "Retag images → :stable"
        run: |
          for img in financeguard-backend financeguard-frontend; do
            M=$(aws ecr batch-get-image --region ${{ env.AWS_REGION }} \
              --repository-name "$img" \
              --image-ids imageTag=${{ github.sha }} \
              --query 'images[0].imageManifest' --output text)
            aws ecr put-image --region ${{ env.AWS_REGION }} \
              --repository-name "$img" --image-tag stable --image-manifest "$M"
          done

      - name: "🏷️ Create GitHub Release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "## FinanceGuard v0.1.${{ github.run_number }}

          **Commit:** \`${{ github.sha }}\`
          **Pipeline:** [Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Deployer:** Argo CD (GitOps) — manifest: \`gitops/prod/\`

          ### Images
          \`\`\`
          ${{ env.ECR_BACKEND }}:${{ github.sha }}  (:stable)
          ${{ env.ECR_FRONTEND }}:${{ github.sha }} (:stable)
          \`\`\`

          📦 Download **EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}** artifact for submission."

  notify-failure:
    name: "📢 Notify Production Failure"
    runs-on: ubuntu-latest
    needs: [ deploy-prod, evidence-release ]
    if: always() && (needs.deploy-prod.result == 'failure' || needs.evidence-release.result == 'failure')
    steps:
      - uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ *FinanceGuard production deployment FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version",  "value": "v0.1.${{ github.run_number }}", "short": true},
                  {"title": "Commit",   "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor",    "value": "${{ github.actor }}", "short": true},
                  {"title": "Run URL",  "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
