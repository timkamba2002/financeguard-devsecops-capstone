# Base defaults — overridden by values-<env>.yaml per environment
replicaCount: 1

image:
  repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

env:
  ENVIRONMENT: "dev"
  SKIP_AUTH_VERIFICATION: "true"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

envFrom:
  - secretRef:
      name: financeguard-db-secret
