# Base defaults — overridden by values-<env>.yaml per environment
replicaCount: 1

image:
  repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false   # overridden true in values-<env>.yaml

# Default env — overridden per environment
env:
  BACKEND_API_URL: "http://localhost:8000"
