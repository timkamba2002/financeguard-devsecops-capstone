apiVersion: v1
kind: ConfigMap
metadata:
  name: financeguard-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  financeguard-logs.json: |
    {
      "title": "FinanceGuard — Logs Explorer",
      "uid": "financeguard-logs",
      "tags": ["financeguard", "logs", "loki"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "app",
            "type": "custom",
            "label": "App",
            "current": { "text": "All", "value": ".*" },
            "options": [
              { "text": "All",      "value": ".*",                     "selected": true },
              { "text": "backend",  "value": "financeguard-backend",   "selected": false },
              { "text": "frontend", "value": "financeguard-frontend",  "selected": false }
            ],
            "query": ".*,financeguard-backend,financeguard-frontend"
          },
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "current": { "text": "All", "value": ".*" },
            "options": [
              { "text": "All",     "value": ".*",       "selected": true },
              { "text": "dev",     "value": "dev",      "selected": false },
              { "text": "staging", "value": "staging",  "selected": false },
              { "text": "prod",    "value": "prod",     "selected": false }
            ],
            "query": ".*,dev,staging,prod"
          },
          {
            "name": "level",
            "type": "custom",
            "label": "Level",
            "current": { "text": "All", "value": ".*" },
            "options": [
              { "text": "All",   "value": ".*",   "selected": true },
              { "text": "INFO",  "value": "INFO",  "selected": false },
              { "text": "WARN",  "value": "WARN",  "selected": false },
              { "text": "ERROR", "value": "ERROR", "selected": false }
            ],
            "query": ".*,INFO,WARN,ERROR"
          }
        ]
      },
      "panels": [

        {
          "id": 1, "type": "row",
          "title": "📋 Live Log Stream",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 2, "type": "logs",
          "title": "Application Logs — $namespace / $app [$level]",
          "gridPos": { "x": 0, "y": 1, "w": 24, "h": 14 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [{
            "expr": "{app=~\"$app\", namespace=~\"$namespace\", level=~\"$level\"}",
            "legendFormat": "",
            "maxLines": 500,
            "refId": "A"
          }]
        },

        {
          "id": 3, "type": "row",
          "title": "🔴 Errors & Warnings",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 4, "type": "timeseries",
          "title": "Log Volume by Level",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 1, "fillOpacity": 20, "drawStyle": "bars" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "ERROR" }, "properties": [{ "id": "color", "value": { "fixedColor": "red",    "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "WARN"  }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "INFO"  }, "properties": [{ "id": "color", "value": { "fixedColor": "blue",   "mode": "fixed" } }] }
            ]
          },
          "targets": [{
            "expr": "sum by (level) (count_over_time({app=~\"$app\", namespace=~\"$namespace\"}[5m]))",
            "legendFormat": "{{level}}",
            "refId": "A"
          }]
        },

        {
          "id": 5, "type": "logs",
          "title": "Errors Only",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [{
            "expr": "{app=~\"$app\", namespace=~\"$namespace\", level=\"ERROR\"}",
            "maxLines": 100,
            "refId": "A"
          }]
        },

        {
          "id": 6, "type": "row",
          "title": "📊 Log Rate",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 7, "type": "timeseries",
          "title": "Log Lines per Minute by App",
          "gridPos": { "x": 0, "y": 25, "w": 24, "h": 7 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 5 }
            }
          },
          "targets": [{
            "expr": "sum by (app) (rate({app=~\"$app\", namespace=~\"$namespace\"}[1m]))",
            "legendFormat": "{{app}}",
            "refId": "A"
          }]
        }
      ]
    }
