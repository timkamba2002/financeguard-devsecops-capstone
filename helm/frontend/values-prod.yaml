replicaCount: 3

image:
  tag: "latest"
  pullPolicy: Always

env:
  # After first deploy, run: kubectl get ingress -n prod -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}'
  # For production, consider registering a real domain via Route53 and using HTTPS.
  BACKEND_API_URL: "https://PROD_BACKEND_ALB_REPLACE_AFTER_FIRST_DEPLOY"

resources:
  limits:
    cpu: 400m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
