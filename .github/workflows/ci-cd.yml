name: FinanceGuard DevSecOps CI/CD

on:
  push:
    branches: [ main, staging, production ]
  pull_request:
    branches: [ main, staging, production ]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 866934333672.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER:  financeguard-eks-dev

# ─────────────────────────────────────────────────────────────────────────────
# Branch → environment mapping
#   main        →  dev        (fast iteration, auth verification skipped)
#   staging     →  staging    (pre-prod, auth verification enabled)
#   production  →  prod       (full resources, no auto-prune in ArgoCD)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ─── 1. Backend tests & lint ───────────────────────────────────────────────
  python-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Lint with Black
        run: |
          pip install black
          black --check app/backend/

      - name: Run Pytest
        run: pytest app/backend/tests/

  # ─── 2. Dockerfile lint + image build + Trivy scan ────────────────────────
  docker-scan:
    name: Docker Build & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/frontend/Dockerfile

      - name: Build Backend Image
        run: docker build -t financeguard-backend:scan ./app/backend

      - name: Build Frontend Image
        run: docker build -t financeguard-frontend:scan ./app/frontend

      - name: Scan Backend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: financeguard-backend:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Scan Frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: financeguard-frontend:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  # ─── 3. Terraform format check + Checkov IaC scan ─────────────────────────
  terraform-check:
    name: Terraform Check & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform

      - name: IaC Security Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  # ─── 4a. Deploy → dev  (main branch only) ─────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [ docker-scan, terraform-check ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-backend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./app/backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Build & push frontend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-frontend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./app/frontend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Bump image tags in dev Helm values
        run: |
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/backend/values-dev.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/frontend/values-dev.yaml

      - name: Commit & push tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/backend/values-dev.yaml helm/frontend/values-dev.yaml
          git diff --staged --quiet || \
            git commit -m "ci(dev): bump image tags to ${{ github.sha }} [skip ci]"
          git push

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Trigger ArgoCD hard refresh (dev)
        run: |
          kubectl annotate app financeguard-backend-dev \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite
          kubectl annotate app financeguard-frontend-dev \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite

      - name: Wait for dev rollout
        run: |
          sleep 30
          kubectl rollout status deployment/financeguard-backend-dev-backend  -n dev --timeout=180s
          kubectl rollout status deployment/financeguard-frontend-dev-frontend -n dev --timeout=180s

  # ─── 4b. Deploy → staging  (staging branch only) ──────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ docker-scan, terraform-check ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment: staging
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-backend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:staging-latest ./app/backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:staging-latest

      - name: Build & push frontend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-frontend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:staging-latest ./app/frontend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:staging-latest

      - name: Bump image tags in staging Helm values
        run: |
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/backend/values-staging.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/frontend/values-staging.yaml

      - name: Commit & push tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/backend/values-staging.yaml helm/frontend/values-staging.yaml
          git diff --staged --quiet || \
            git commit -m "ci(staging): bump image tags to ${{ github.sha }} [skip ci]"
          git push

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Trigger ArgoCD hard refresh (staging)
        run: |
          kubectl annotate app financeguard-backend-staging \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite
          kubectl annotate app financeguard-frontend-staging \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite

      - name: Wait for staging rollout
        run: |
          sleep 30
          kubectl rollout status deployment/financeguard-backend-staging-backend  -n staging --timeout=180s
          kubectl rollout status deployment/financeguard-frontend-staging-frontend -n staging --timeout=180s

  # ─── 4c. Deploy → prod  (production branch only) ──────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ docker-scan, terraform-check ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    environment: production          # requires manual approval in GitHub Environments
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-backend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:prod-latest ./app/backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:prod-latest

      - name: Build & push frontend image
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/financeguard-frontend
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:prod-latest ./app/frontend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:prod-latest

      - name: Bump image tags in prod Helm values
        run: |
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/backend/values-prod.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ github.sha }}\"/" helm/frontend/values-prod.yaml

      - name: Commit & push tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/backend/values-prod.yaml helm/frontend/values-prod.yaml
          git diff --staged --quiet || \
            git commit -m "ci(prod): bump image tags to ${{ github.sha }} [skip ci]"
          git push

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Trigger ArgoCD hard refresh (prod)
        run: |
          kubectl annotate app financeguard-backend-prod \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite
          kubectl annotate app financeguard-frontend-prod \
            argocd.argoproj.io/refresh=hard -n argocd --overwrite

      - name: Wait for prod rollout
        run: |
          sleep 30
          kubectl rollout status deployment/financeguard-backend-prod-backend  -n prod --timeout=180s
          kubectl rollout status deployment/financeguard-frontend-prod-frontend -n prod --timeout=180s
