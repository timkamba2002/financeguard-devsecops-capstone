apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: financeguard-frontend-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/timkamba2002/financeguard-devsecops-capstone.git
    targetRevision: main    # trunk-based: all environments track main
    path: helm/frontend
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
