apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart:   loki-stack
      targetRevision: "2.10.2"
      helm:
        valueFiles:
          - $values/k8s/observability/loki/values.yaml
    - repoURL: https://github.com/timkamba2002/financeguard-devsecops-capstone.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
