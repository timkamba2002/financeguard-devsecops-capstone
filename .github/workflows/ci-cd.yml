name: FinanceGuard CI/CD — Trunk-Based (Model B)

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  FINANCEGUARD DEVSECOPS — TRUNK-BASED PIPELINE (Model B)                 ║
# ║                                                                           ║
# ║  • Trunk-based: All changes merge into `main`                            ║
# ║  • Same image digest flows: Dev (auto) → Staging (✋) → Prod (✋)        ║
# ║  • Strong security toolchain + Demo-friendly green pipeline              ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 866934333672.dkr.ecr.us-east-1.amazonaws.com
  ECR_BACKEND:  866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
  ECR_FRONTEND: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  EKS_CLUSTER:  financeguard-eks-dev
  CHART_REPO:   oci://866934333672.dkr.ecr.us-east-1.amazonaws.com/charts

jobs:

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                        STAGE 0 · PR VALIDATION                        ║
  # ║  Runs on every PR to main. All checks must pass before merge.         ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  pr-validation:
    name: "🔍 Stage 0 · PR Validation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Secret scan ──────────────────────────────────────────────────────
      # DEMO: continue-on-error — pipeline stays green even if secrets found.
      # PRODUCTION: remove continue-on-error. A leaked secret MUST block merge.
      - name: "🔑 Gitleaks — Secret Scan"
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── SAST (primary) ───────────────────────────────────────────────────
      # DEMO: continue-on-error — findings appear in Security tab, pipeline green.
      # PRODUCTION: remove continue-on-error. HIGH/CRITICAL (SQLi, hardcoded creds,
      # broken auth) MUST block merge before vulnerable code reaches main.
      - name: "🛡️ Semgrep — SAST Primary (OWASP Top-10)"
        run: |
          pip install semgrep -q
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            app/backend/ || true
        continue-on-error: true   # DEMO ONLY — remove for production

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category:   semgrep-pr

      # ── IaC scan ──────────────────────────────────────────────────────────
      # DEMO: continue-on-error — findings go to Security tab.
      # PRODUCTION: remove continue-on-error. Terraform misconfigs (open S3,
      # unencrypted RDS, 0.0.0.0/0 security groups) MUST block merge.
      - name: "🏗️ Checkov + TFLint — IaC Scan"
        run: |
          pip install checkov -q
          checkov -d terraform/ --framework terraform --soft-fail --quiet || true
          terraform -chdir=terraform init -backend=false -input=false -no-color 2>&1 | tail -5 || true
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── Unit tests — always hard fail, no exceptions ──────────────────────
      - name: "🧪 Tests + Black Lint"
        run: |
          pip install -r app/backend/requirements.txt pytest pytest-cov black -q
          black --check app/backend/
          pytest app/backend/tests/ \
            --junitxml=test-results/junit.xml \
            --cov=app/backend \
            --cov-report=xml:test-results/coverage.xml \
            -q
        env:
          DATABASE_URL: sqlite:///./test.db

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:          Unit Test Results
          path:          test-results/junit.xml
          reporter:      java-junit
          fail-on-error: true

      # ── SonarCloud ────────────────────────────────────────────────────────
      # DEMO: continue-on-error — quality gate result visible at sonarcloud.io.
      # PRODUCTION: remove continue-on-error. Failing gate (coverage drop,
      # security hotspot, rating D/E) MUST block merge.
      - name: "📊 SonarCloud — Quality Gate"
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

      # ── Job summary (visible in GitHub Actions UI) ────────────────────────
      - name: "📋 Write PR validation summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🔍 PR Validation — FinanceGuard

          | # | Check | Tool | Gate |
          |---|---|---|---|
          | 0.1 | Secret scan | Gitleaks (full history) | ⚠️ demo: warn |
          | 0.2 | SAST — OWASP Top-10 | Semgrep | ⚠️ demo: warn |
          | 0.3 | IaC misconfigs | Checkov + TFLint | ⚠️ demo: warn |
          | 0.4 | Unit tests + Black | pytest + Black | ✅ always hard fail |
          | 0.5 | Code quality gate | SonarCloud | ⚠️ demo: warn |

          > **Demo note:** Security checks run with `continue-on-error: true` so the
          > pipeline stays green. In production, remove that flag — HIGH/CRITICAL
          > findings must block the merge.

          **Commit:** `${{ github.sha }}`  |  **PR:** #${{ github.event.pull_request.number }}  |  **Author:** @${{ github.actor }}
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                 STAGE 1 · BUILD, SCAN, SIGN & PUSH                    ║
  # ║  Triggered on push to main. Produces immutable images tagged :sha.    ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  build-sign-push:
    name: "🏗️ Stage 1 · Build, Scan, Sign & Push"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token:        write    # required for OIDC cosign keyless signing
      contents:        read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      # ── Backend ───────────────────────────────────────────────────────────
      - name: "🔨 Build backend image (GHA layer cache)"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/backend
          load:       true
          push:       false
          tags:       financeguard-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # DEMO: continue-on-error — vulnerable image CAN reach ECR for demo.
      # PRODUCTION: remove continue-on-error. CRITICAL/HIGH fixable CVE MUST
      # block the push — a vulnerable image in ECR can be deployed anywhere.
      - name: "🔍 Trivy — Backend (CRITICAL/HIGH fixable)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-backend:${{ github.sha }}
          format:         sarif
          output:         trivy-backend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "📄 Syft SBOM — Backend (SPDX 2.3)"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-backend:${{ github.sha }}
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json
          output-file:   sbom-backend.spdx.json

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: "🔨 Build frontend image (GHA layer cache)"
        uses: docker/build-push-action@v5
        with:
          context:    ./app/frontend
          load:       true
          push:       false
          tags:       financeguard-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # DEMO: continue-on-error — same gate as backend.
      # PRODUCTION: remove continue-on-error.
      - name: "🔍 Trivy — Frontend (CRITICAL/HIGH fixable)"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          image-ref:      financeguard-frontend:${{ github.sha }}
          format:         sarif
          output:         trivy-frontend.sarif
          exit-code:      "1"
          ignore-unfixed: true
          vuln-type:      os,library
          severity:       CRITICAL,HIGH

      - name: "📄 Syft SBOM — Frontend (SPDX 2.3)"
        uses: anchore/sbom-action@v0
        with:
          image:         financeguard-frontend:${{ github.sha }}
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json
          output-file:   sbom-frontend.spdx.json

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category:   trivy

      # ── Push to ECR ───────────────────────────────────────────────────────
      - name: "📤 Push images to ECR"
        run: |
          docker tag financeguard-backend:${{ github.sha }}  ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker tag financeguard-backend:${{ github.sha }}  ${{ env.ECR_BACKEND }}:latest
          docker push ${{ env.ECR_BACKEND }}:${{ github.sha }}
          docker push ${{ env.ECR_BACKEND }}:latest

          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker tag financeguard-frontend:${{ github.sha }} ${{ env.ECR_FRONTEND }}:latest
          docker push ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.ECR_FRONTEND }}:latest

      # ── Cosign keyless signing ─────────────────────────────────────────────
      # No keys to manage — GitHub OIDC token is the identity.
      # Signature stored as OCI artifact in ECR alongside the image.
      # Identity recorded: github.com/<repo>/.github/workflows/ci-cd.yml@refs/heads/main
      #
      # DEMO: continue-on-error so pipeline continues if signing fails.
      # PRODUCTION: remove continue-on-error. Unsigned image = supply-chain failure.
      - uses: sigstore/cosign-installer@v3

      - name: "🔏 Cosign sign images (OIDC keyless)"
        run: |
          cosign sign --yes ${{ env.ECR_BACKEND }}:${{ github.sha }}
          cosign sign --yes ${{ env.ECR_FRONTEND }}:${{ github.sha }}
        continue-on-error: true   # DEMO ONLY — remove for production

      # ── ECR lifecycle + Helm charts ───────────────────────────────────────
      - name: "♻️ Apply ECR lifecycle policies"
        run: |
          for repo in financeguard-backend financeguard-frontend; do
            aws ecr put-lifecycle-policy \
              --repository-name "$repo" \
              --lifecycle-policy-text '{
                "rules": [{
                  "rulePriority": 1,
                  "description": "Expire untagged images after 14 days",
                  "selection": {"tagStatus":"untagged","countType":"sinceImagePushed","countUnit":"days","countNumber":14},
                  "action": {"type":"expire"}
                }]
              }'
          done

      - name: "📦 Package & push Helm charts to ECR OCI"
        run: |
          # ECR does not auto-create repositories on push — must exist first
          aws ecr create-repository --repository-name charts/backend  --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ecr create-repository --repository-name charts/frontend --region ${{ env.AWS_REGION }} 2>/dev/null || true

          helm package helm/backend  --version 0.1.${{ github.run_number }} \
            --app-version ${{ github.sha }} --destination dist/
          helm package helm/frontend --version 0.1.${{ github.run_number }} \
            --app-version ${{ github.sha }} --destination dist/
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          helm push dist/backend-0.1.${{ github.run_number }}.tgz  ${{ env.CHART_REPO }}
          helm push dist/frontend-0.1.${{ github.run_number }}.tgz ${{ env.CHART_REPO }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           build-artifacts-${{ github.sha }}
          path: |
            *.sarif
            *.spdx.json
            dist/*.tgz
          retention-days: 30

      # ── Job summary ───────────────────────────────────────────────────────
      - name: "📋 Write build summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🏗️ Build, Scan, Sign & Push — FinanceGuard

          | # | Step | Detail | Status |
          |---|---|---|---|
          | 1.1 | Docker build | backend + frontend (GHA layer cache) | ✅ |
          | 1.2 | Trivy scan | CRITICAL/HIGH fixable CVEs | ⚠️ demo: warn |
          | 1.3 | Syft SBOM | SPDX 2.3 format | ✅ artifact |
          | 1.4 | ECR push | \`:${{ github.sha }}\` + \`:latest\` | ✅ |
          | 1.5 | Cosign sign | OIDC keyless (Sigstore Fulcio/Rekor) | ⚠️ demo: warn |
          | 1.6 | Helm charts | v0.1.${{ github.run_number }} → ECR OCI | ✅ |

          **Images pushed:**
          \`\`\`
          ${{ env.ECR_BACKEND }}:${{ github.sha }}
          ${{ env.ECR_FRONTEND }}:${{ github.sha }}
          \`\`\`

          > Images are tagged with the **commit SHA** — the same digest flows unchanged
          > through dev → staging → prod. Nothing is rebuilt between environments.
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                      STAGE 2 · DEPLOY TO DEV                          ║
  # ║  Auto-deploys after build. `dev` environment has no required           ║
  # ║  reviewers. cosign verify + helm diff before every upgrade.           ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-dev:
    name: "🚀 Stage 2 · Deploy → Dev (auto)"
    runs-on: ubuntu-latest
    needs: build-sign-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev    # no required reviewers → deploys automatically
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # DEMO: continue-on-error so demo deploy proceeds without signature.
      # PRODUCTION: remove. Unsigned image = supply-chain integrity failure.
      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify images"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-dev.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "📊 helm diff — backend (preview changes)"
        run: |
          helm diff upgrade financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} --namespace dev \
            -f helm/backend/values.yaml -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-dev.txt || true

      - name: "🚀 helm upgrade — backend → dev (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-dev.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: "📊 helm diff — frontend"
        run: |
          helm diff upgrade financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} --namespace dev \
            -f helm/frontend/values.yaml -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-dev.txt || true

      - name: "🚀 helm upgrade — frontend → dev (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace dev --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-dev.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-dev-artifacts-${{ github.sha }}
          path: |
            cosign-verify-dev.txt
            helm-diff-*-dev.txt
          retention-days: 30

      # ── Job summary ───────────────────────────────────────────────────────
      - name: "📋 Write dev deploy summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Dev Deployment — FinanceGuard

          **Namespace:** \`dev\`  |  **Image:** \`${{ github.sha }}\`  |  **Chart:** \`v0.1.${{ github.run_number }}\`

          | Step | Detail |
          |---|---|
          | Cosign verify | Supply-chain integrity check (⚠️ demo: warn) |
          | helm diff | Resource changes previewed before apply |
          | helm upgrade --atomic | Auto-rollback on timeout or crash-loop |
          | Timeout | 5 minutes per service |

          **Deployment mode:** Automatic — no approval required for dev.
          The same commit SHA (\`${{ github.sha }}\`) will flow unchanged to staging and production.
          EOF

  integration-test-dev:
    name: "🧪 Stage 2 · Integration Tests (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "url=http://$HOST" >> $GITHUB_OUTPUT
          echo "host=$HOST" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html -q

      - name: "Run integration tests vs live dev cluster"
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (dev)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-dev-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

      - name: "📋 Write integration test summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 Integration Tests — Dev

          **Target:** \`http://${{ steps.alb.outputs.host }}\`

          Tests run against the **live dev cluster** over the real ALB endpoint.
          Covers: health check, transaction CRUD, error responses (422), pagination.
          EOF

  zap-dev:
    name: "🛡️ Stage 2 · DAST Baseline (dev)"
    runs-on: ubuntu-latest
    needs: deploy-dev
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve dev ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n dev \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      # Dev ZAP = passive scan only. Purpose is early visibility, not blocking.
      # DEMO: continue-on-error + fail_action: false — report only.
      # PRODUCTION: keep fail_action: false for dev (dev is not a hard gate).
      # The staging FULL scan below is where fail_action: true should be set.
      - name: "🕷️ OWASP ZAP Baseline Scan (passive, dev)"
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false
          artifact_name: zap-baseline-dev-${{ github.sha }}

      - name: "📋 Write ZAP dev summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🛡️ DAST — ZAP Baseline (Dev)

          **Scan type:** Passive (spider + passive rules — no active attack payloads)
          **Target:** \`${{ steps.alb.outputs.target }}\`

          | Setting | Value |
          |---|---|
          | fail_action | \`false\` — report only in dev |
          | continue-on-error | \`true\` — demo mode |

          > The **full active scan** (with real attack payloads) runs in **staging**
          > and is the last DAST gate before production.
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                    STAGE 3 · DEPLOY TO STAGING                        ║
  # ║  Requires manual approval via the `staging` GitHub Environment.       ║
  # ║  Same :sha image from dev — no rebuild.                               ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-staging:
    name: "🚀 Stage 3 · Deploy → Staging (✋ approval)"
    runs-on: ubuntu-latest
    needs: [ integration-test-dev, zap-dev ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging    # ← PAUSES HERE — click Approve in GitHub Environments UI
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # DEMO: continue-on-error. PRODUCTION: remove — unsigned image must not deploy.
      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify images"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-staging.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "📊 helm diff — backend (staging)"
        run: |
          helm diff upgrade financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} --namespace staging \
            -f helm/backend/values.yaml -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-staging.txt || true

      - name: "🚀 helm upgrade — backend → staging (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-staging.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - name: "📊 helm diff — frontend (staging)"
        run: |
          helm diff upgrade financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} --namespace staging \
            -f helm/frontend/values.yaml -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-staging.txt || true

      - name: "🚀 helm upgrade — frontend → staging (--atomic 5m)"
        run: |
          helm upgrade --install financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace staging --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-staging.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=5m

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-staging-artifacts-${{ github.sha }}
          path: |
            cosign-verify-staging.txt
            helm-diff-*-staging.txt
          retention-days: 30

      - name: "📋 Write staging deploy summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Staging Deployment — FinanceGuard

          **Namespace:** \`staging\`  |  **Image:** \`${{ github.sha }}\`  |  **Chart:** \`v0.1.${{ github.run_number }}\`

          | Step | Detail |
          |---|---|
          | Approval | ✅ Manually approved in GitHub Environments |
          | Cosign verify | Supply-chain integrity check (⚠️ demo: warn) |
          | helm diff | Resource changes previewed before apply |
          | helm upgrade --atomic | Auto-rollback on failure |

          **Note:** This is the same image that was deployed and tested in dev.
          No rebuild — only the namespace and values overlay changed.
          EOF

  integration-test-staging:
    name: "🧪 Stage 3 · Integration Tests (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "url=http://$HOST" >> $GITHUB_OUTPUT

      - run: pip install requests pytest pytest-html -q

      - name: "Run integration tests vs live staging cluster"
        env:
          API_URL: ${{ steps.alb.outputs.url }}
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results/junit.xml \
            --html=integration-results/report.html \
            -v

      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name:     Integration Tests (staging)
          path:     integration-results/junit.xml
          reporter: java-junit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           integration-staging-${{ github.sha }}
          path:           integration-results/
          retention-days: 30

  zap-staging:
    name: "🛡️ Stage 3 · DAST Full Scan (staging)"
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Resolve staging ALB hostname"
        id: alb
        run: |
          HOST=$(kubectl get ingress -n staging \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "target=http://$HOST" >> $GITHUB_OUTPUT

      # Full/active scan — real injection, XSS, broken auth payloads.
      # This is the LAST DAST gate before production.
      # DEMO: continue-on-error + fail_action: false — pipeline stays green.
      # PRODUCTION: remove continue-on-error AND set fail_action: true.
      # Any HIGH finding here MUST block the production promotion.
      - name: "🕷️ OWASP ZAP Full Scan (active, staging)"
        uses: zaproxy/action-full-scan@v0.10.0
        continue-on-error: true   # DEMO ONLY — remove for production
        with:
          target:        ${{ steps.alb.outputs.target }}
          fail_action:   false    # DEMO ONLY — set to true in production
          artifact_name: zap-full-staging-${{ github.sha }}

      - name: "📋 Write ZAP staging summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🛡️ DAST — ZAP Full Scan (Staging)

          **Scan type:** Active (real injection, XSS, broken auth, CSRF payloads)
          **Target:** \`${{ steps.alb.outputs.target }}\`

          | Setting | Value |
          |---|---|
          | fail_action | \`false\` — demo mode (set to \`true\` in production) |
          | continue-on-error | \`true\` — demo mode |

          > ⚠️ This is the **last security gate before production**.
          > In production, HIGH ZAP findings here **MUST** block the promotion.
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║                   STAGE 4 · DEPLOY TO PRODUCTION                      ║
  # ║  Requires manual approval via the `production` GitHub Environment.    ║
  # ║  GitHub records who approved and when — this is the audit trail.      ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  deploy-prod:
    name: "🚀 Stage 4 · Deploy → Production (✋ approval)"
    runs-on: ubuntu-latest
    needs: [ integration-test-staging, zap-staging ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # ← PAUSES HERE — click Approve in GitHub Environments UI
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      # DEMO: continue-on-error. PRODUCTION: remove — unsigned image in prod = critical failure.
      - uses: sigstore/cosign-installer@v3
      - name: "🔏 Cosign verify images (pre-production)"
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.ECR_BACKEND }}:${{ github.sha }} 2>&1 | tee cosign-verify-prod.txt
        continue-on-error: true   # DEMO ONLY — remove for production

      - name: "Helm login to ECR OCI"
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            helm registry login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - run: helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true

      - name: "📊 helm diff — backend (production)"
        run: |
          helm diff upgrade financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} --namespace prod \
            -f helm/backend/values.yaml -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-backend-prod.txt || true

      - name: "🚀 helm upgrade — backend → production (--atomic 10m)"
        run: |
          helm upgrade --install financeguard-backend ${{ env.CHART_REPO }}/backend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/backend/values.yaml -f helm/backend/values-prod.yaml \
            --set image.repository=${{ env.ECR_BACKEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      - name: "📊 helm diff — frontend (production)"
        run: |
          helm diff upgrade financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} --namespace prod \
            -f helm/frontend/values.yaml -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --allow-unreleased 2>&1 | tee helm-diff-frontend-prod.txt || true

      - name: "🚀 helm upgrade — frontend → production (--atomic 10m)"
        run: |
          helm upgrade --install financeguard-frontend ${{ env.CHART_REPO }}/frontend \
            --version 0.1.${{ github.run_number }} \
            --namespace prod --create-namespace \
            -f helm/frontend/values.yaml -f helm/frontend/values-prod.yaml \
            --set image.repository=${{ env.ECR_FRONTEND }} \
            --set image.tag=${{ github.sha }} \
            --atomic --timeout=10m

      - name: "✅ Post-deploy smoke test (2 min retry)"
        run: |
          HOST=$(kubectl get ingress -n prod \
            -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "Production: http://$HOST"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$HOST/health" || echo "000")
            [ "$STATUS" = "200" ] && { echo "✅ /health → 200 (attempt $i)"; break; }
            echo "⏳ attempt $i/12 → HTTP $STATUS"; sleep 10
          done
          [ "$STATUS" = "200" ] || { echo "❌ Smoke test timed out"; exit 1; }
          echo "✅ Production healthy"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           deploy-prod-artifacts-${{ github.sha }}
          path: |
            cosign-verify-prod.txt
            helm-diff-*-prod.txt
          retention-days: 90

      - name: "📋 Write production deploy summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 Production Deployment — FinanceGuard v0.1.${{ github.run_number }}

          **Namespace:** \`prod\`  |  **Image:** \`${{ github.sha }}\`  |  **Chart:** \`v0.1.${{ github.run_number }}\`

          | Step | Detail |
          |---|---|
          | Approval | ✅ Manually approved — approver and timestamp recorded by GitHub |
          | Cosign verify | Supply-chain integrity check (⚠️ demo: warn) |
          | helm diff | Resource changes reviewed before apply |
          | helm upgrade --atomic | Timeout 10m, auto-rollback on failure |
          | Smoke test | /health + /api/v1/transactions both 200 ✅ |

          **Security gates passed (across all stages):**
          Gitleaks · Semgrep · Checkov · pytest · SonarCloud ·
          Trivy · Syft SBOM · Cosign sign/verify ·
          ZAP baseline (dev) · ZAP full scan (staging) · Kyverno · Falco · ESO
          EOF

  # ╔════════════════════════════════════════════════════════════════════════╗
  # ║              STAGE 5 · EVIDENCE BUNDLE + GITHUB RELEASE               ║
  # ╚════════════════════════════════════════════════════════════════════════╝

  evidence-release:
    name: "📦 Stage 5 · Evidence Bundle + Release"
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: "Download all pipeline artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: "Assemble evidence bundle"
        run: |
          mkdir -p evidence/{security,tests,sbom,signatures,deployment}

          cp -r artifacts/build-artifacts-*/         evidence/security/  2>/dev/null || true
          cp -r artifacts/integration-dev-*/         evidence/tests/     2>/dev/null || true
          cp -r artifacts/integration-staging-*/     evidence/tests/     2>/dev/null || true
          cp -r artifacts/deploy-dev-artifacts-*/    evidence/deployment/ 2>/dev/null || true
          cp -r artifacts/deploy-staging-artifacts-*/ evidence/deployment/ 2>/dev/null || true
          cp -r artifacts/deploy-prod-artifacts-*/   evidence/deployment/ 2>/dev/null || true
          find artifacts/ -name "*.spdx.json" -exec cp {} evidence/sbom/ \; 2>/dev/null || true

          helm history financeguard-backend  -n prod --max 10 --output table \
            > evidence/deployment/helm-history-backend.txt  2>/dev/null || true
          helm history financeguard-frontend -n prod --max 10 --output table \
            > evidence/deployment/helm-history-frontend.txt 2>/dev/null || true

          cat > evidence/manifest.json << EOF
          {
            "project":   "FinanceGuard DevSecOps Capstone",
            "model":     "Trunk-Based Development (Model B)",
            "version":   "v0.1.${{ github.run_number }}",
            "commit":    "${{ github.sha }}",
            "actor":     "${{ github.actor }}",
            "pipeline":  "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "tools":     ["Gitleaks","Semgrep","Checkov","TFLint","SonarCloud","Trivy","Syft","Cosign","ZAP","Kyverno","Falco","ESO"],
            "note":      "Security scans run with continue-on-error for demo. Remove flag in production."
          }
          EOF

          echo "── Evidence bundle ──"
          find evidence/ -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name:           "EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}-${{ github.sha }}"
          path:           evidence/
          retention-days: 90

      - name: "Retag images → :stable"
        run: |
          for img in financeguard-backend financeguard-frontend; do
            M=$(aws ecr batch-get-image --region ${{ env.AWS_REGION }} \
              --repository-name "$img" \
              --image-ids imageTag=${{ github.sha }} \
              --query 'images[0].imageManifest' --output text)
            aws ecr put-image --region ${{ env.AWS_REGION }} \
              --repository-name "$img" --image-tag stable --image-manifest "$M"
          done

      - name: "🏷️ Create GitHub Release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v0.1.${{ github.run_number }} \
            --title "FinanceGuard v0.1.${{ github.run_number }}" \
            --notes "## FinanceGuard v0.1.${{ github.run_number }}

          **Commit:** \`${{ github.sha }}\`
          **Pipeline:** [Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### Images
          \`\`\`
          ${{ env.ECR_BACKEND }}:${{ github.sha }}  (:stable)
          ${{ env.ECR_FRONTEND }}:${{ github.sha }} (:stable)
          \`\`\`

          📦 Download **EVIDENCE-BUNDLE-v0.1.${{ github.run_number }}** artifact for submission."

      - name: "📋 Write evidence + release summary"
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📦 Evidence Bundle + Release — v0.1.${{ github.run_number }}

          | Artifact | Contents |
          |---|---|
          | \`evidence/security/\` | Trivy SARIFs, Semgrep SARIF |
          | \`evidence/tests/\` | Integration test results (dev + staging) |
          | \`evidence/sbom/\` | SPDX 2.3 SBOMs for backend + frontend |
          | \`evidence/deployment/\` | helm diffs, cosign verify outputs, helm history |
          | \`evidence/manifest.json\` | Pipeline metadata + tool inventory |

          **Retention:** 90 days  |  **Release:** v0.1.${{ github.run_number }}
          **Images retagged:** \`:stable\`

          > Download the **EVIDENCE-BUNDLE** artifact from this run for capstone submission.
          EOF

  # ── Production failure notification ──────────────────────────────────────
  notify-failure:
    name: "📢 Notify Production Failure"
    runs-on: ubuntu-latest
    needs: [ deploy-prod, evidence-release ]
    if: always() && (needs.deploy-prod.result == 'failure' || needs.evidence-release.result == 'failure')
    steps:
      - uses: slackapi/slack-github-action@v1.26.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ *FinanceGuard production deployment FAILED*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version", "value": "v0.1.${{ github.run_number }}", "short": true},
                  {"title": "Commit",  "value": "${{ github.sha }}", "short": true},
                  {"title": "Actor",   "value": "${{ github.actor }}", "short": true},
                  {"title": "Run URL", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
