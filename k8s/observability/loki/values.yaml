# Loki stack Helm values (loki-stack chart = Loki + Promtail)
#
# Install: helm upgrade --install loki grafana/loki-stack \
#            --namespace monitoring -f this-file.yaml --version 2.10.2

loki:
  enabled: true
  isDistributed: false

  # EKS Fargate: EBS PVCs can't bind — use emptyDir (ephemeral, fine for capstone)
  persistence:
    enabled: false

  config:
    auth_enabled: false

    server:
      http_listen_port: 3100

    # Use boltdb-shipper (Loki 2.x default) with filesystem store.
    # Paths match where the chart mounts the emptyDir volume (/data).
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 1h
      max_chunk_age: 1h
      chunk_target_size: 1048576

    schema_config:
      configs:
        - from: "2020-10-24"
          store:        boltdb-shipper
          object_store: filesystem
          schema:       v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location:         /data/loki/boltdb-shipper-cache
        shared_store:           filesystem
      filesystem:
        directory: /data/loki/chunks

    limits_config:
      enforce_metric_name:      false
      reject_old_samples:       true
      reject_old_samples_max_age: 168h

    chunk_store_config:
      max_look_back_period: 0s

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store:      filesystem

  resources:
    requests:
      cpu:    100m
      memory: 256Mi
    limits:
      cpu:    500m
      memory: 512Mi

# Promtail is a DaemonSet — EKS Fargate does not support DaemonSets.
# Logs reach Loki via the OTel Collector OTLP→Loki exporter instead.
promtail:
  enabled: false

# Grafana deployed via prometheus-stack chart
grafana:
  enabled: false
