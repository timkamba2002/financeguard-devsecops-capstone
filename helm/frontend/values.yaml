replicaCount: 2

image:
  repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

# New: Configurable API URL for frontend
env:
  VITE_API_BASE_URL: "http://financeguard-backend-dev-backend.dev.svc.cluster.local:8000"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi