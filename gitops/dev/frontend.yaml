apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: financeguard-frontend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/timkamba2002/financeguard-devsecops-capstone.git
    targetRevision: HEAD
    path: helm/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true