apiVersion: v1
kind: ConfigMap
metadata:
  name: financeguard-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  financeguard-logs.json: |
    {
      "title": "FinanceGuard — Logs Explorer",
      "uid": "financeguard-logs",
      "tags": ["financeguard", "logs", "loki"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "label": "Namespace",
            "current": { "text": "dev", "value": "dev" },
            "options": [
              { "text": "dev",     "value": "dev",     "selected": true },
              { "text": "staging", "value": "staging", "selected": false },
              { "text": "prod",    "value": "prod",    "selected": false }
            ],
            "query": "dev,staging,prod"
          },
          {
            "name": "app",
            "type": "custom",
            "label": "App",
            "current": { "text": "All", "value": ".*" },
            "options": [
              { "text": "All",      "value": ".*",                     "selected": true },
              { "text": "backend",  "value": "financeguard-backend",   "selected": false },
              { "text": "frontend", "value": "financeguard-frontend",  "selected": false }
            ],
            "query": ".*,financeguard-backend,financeguard-frontend"
          }
        ]
      },
      "panels": [

        {
          "id": 1, "type": "row",
          "title": "📋 Live Log Stream",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 2, "type": "logs",
          "title": "Application Logs — $namespace / $app",
          "gridPos": { "x": 0, "y": 1, "w": 24, "h": 14 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [{
            "expr": "{namespace=\"$namespace\", app=~\"$app\"}",
            "legendFormat": "",
            "maxLines": 500,
            "refId": "A"
          }]
        },

        {
          "id": 3, "type": "row",
          "title": "🔴 Errors & Warnings",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 4, "type": "timeseries",
          "title": "Log Volume by Level",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 1, "fillOpacity": 20, "drawStyle": "bars" }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "error" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "warning" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "info" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] }
            ]
          },
          "targets": [{
            "expr": "sum by (level) (count_over_time({namespace=\"$namespace\", app=~\"$app\"}[5m]))",
            "legendFormat": "{{level}}",
            "refId": "A"
          }]
        },

        {
          "id": 5, "type": "logs",
          "title": "Errors Only",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [{
            "expr": "{namespace=\"$namespace\", app=~\"$app\"} |= \"error\" or {namespace=\"$namespace\", app=~\"$app\"} |= \"ERROR\" or {namespace=\"$namespace\", app=~\"$app\"} |= \"exception\"",
            "maxLines": 100,
            "refId": "A"
          }]
        },

        {
          "id": 6, "type": "row",
          "title": "📊 Log Rate",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 1 },
          "collapsed": false
        },

        {
          "id": 7, "type": "timeseries",
          "title": "Log Lines per Minute by Pod",
          "gridPos": { "x": 0, "y": 25, "w": 24, "h": 7 },
          "datasource": { "type": "loki", "uid": "loki" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 5 }
            }
          },
          "targets": [{
            "expr": "sum by (pod) (rate({namespace=\"$namespace\", app=~\"$app\"}[1m]))",
            "legendFormat": "{{pod}}",
            "refId": "A"
          }]
        }
      ]
    }
