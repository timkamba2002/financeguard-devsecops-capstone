apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: financeguard-backend-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/managed-by-pipeline: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/timkamba2002/financeguard-devsecops-capstone.git
    targetRevision: main
    path: helm/backend
    helm:
      releaseName: financeguard-backend
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters:
        - name: image.tag
          value: "c72a0e1ac7e37d9f18fd8f306aa087773a623762"
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    # Production: NO automated sync and NO self-heal.
    # The pipeline triggers sync explicitly after the prod approval gate fires.
    # This prevents any git push — even an accidental one — from immediately
    # deploying to production without a human sign-off in GitHub Environments.
    automated:
      prune: false # never delete prod resources
      selfHeal: false # don't auto-correct drift — human decides
    syncOptions:
      - CreateNamespace=true
