name: FinanceGuard DevSecOps CI/CD

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  python-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt

      - name: Lint with Black
        run: |
          pip install black
          black --check app/backend/

      - name: Run Pytest
        run: |
          pytest app/backend/tests/

  docker-scan:
    name: Docker Build & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/frontend/Dockerfile

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: Build Backend Image
        run: |
          docker build -t financeguard-backend:local ./app/backend

      - name: Build Frontend Image
        run: |
          docker build -t financeguard-frontend:local ./app/frontend

      - name: Scan Backend Container with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "financeguard-backend:local"
          format: "table"
          exit-code: "1" # Fail build on vulnerabilities
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Scan Frontend Container with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "financeguard-frontend:local"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  terraform-check:
    name: Terraform Check & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform

      - name: IaC Security Scan (Checkov)
        name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true # Set to false to block builds on security errors
