apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: financeguard-backend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/timkamba2002/financeguard-devsecops-capstone.git
    targetRevision: HEAD
    path: helm/backend
    helm:
      values: |
        image:
          repository: 866934333672.dkr.ecr.us-east-1.amazonaws.com/financeguard-backend
          tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true